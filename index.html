<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reward App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px 20px;
    }
    h1 { color: #22c55e; }
    .balance {
      font-size: 24px;
      margin: 20px 0;
      padding: 15px;
      background: #1e293b;
      border-radius: 12px;
    }
    button {
      background: #22c55e;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 12px;
      cursor: pointer;
      width: 80%;
      max-width: 300px;
    }
    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }
    p { color: #94a3b8; font-size: 14px; }
  </style>
</head>
<body>
  <h1>💰 Reward App</h1>
  
  <div class="balance">
    Your Balance: $0.00
    <br><small>Railway not setup yet</small>
  </div>

  <button id="adBtn">Watch Ad +$0.02</button>
  <p>Watch a short ad to earn</p>

  <!-- AdsGram SDK -->
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
  <script>
    // 1. Init Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 2. Init AdsGram with YOUR Block ID
    const AdController = window.Adsgram.init({ 
      blockId: "37657" 
    });

    const adBtn = document.getElementById('adBtn');

    adBtn.onclick = async () => {
      adBtn.disabled = true;
      adBtn.innerText = "Loading ad...";
      
      try {
        // 3. Show the rewarded ad
        await AdController.show(); 
        
        // 4. If user watched till end
        alert('Ad finished ✅ \n\nRailway not setup yet, so no $0.02 was credited');
        
      } catch (e) {
        console.log(e);
        if(e.message && e.message.includes("Domain")){
          alert("Domain not whitelisted yet. \nWaiting for AdsGram support");
        } else if(e.message && e.message.includes("No fill")){
          alert("No ads available right now. \nTry again in 1 min");
        } else {
          alert("Ad skipped or closed");
        }
      }
      
      adBtn.innerText = "Watch Ad +$0.02";
      adBtn.disabled = false;
    }
  </script>
</body>
</html>
