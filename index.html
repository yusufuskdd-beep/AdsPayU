<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://ad.gigapub.tech/script?id=7204"></script>
<script src='//libtl.com/sdk.js' data-zone='11258922' data-sdk='show_11258922'></script>
<title>AdsPayU</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #0A2AFF 0%, #0018B3 50%, #000A4D 100%);
    color: #fff; padding-bottom: 90px; min-height: 100vh; background-attachment: fixed;
  }
  #loader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0A2AFF; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; font-size: 16px; font-weight: 600; transition: opacity 0.6s ease; }
  #loader.hide { opacity: 0; pointer-events: none; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid #FF8A00; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to {transform: rotate(360deg)} }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; position: sticky; top: 0; background: rgba(0,10,77,0.8); backdrop-filter: blur(20px); z-index: 10; }
  .topbar h1 { font-size: 18px; font-weight: 700; }

  .balance-card { 
    margin: 16px; 
    padding: 24px; 
    background: linear-gradient(135deg, rgba(255,138,0,0.25) 0%, rgba(24,119,255,0.25) 100%);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px; 
    text-align: center;
  }
  .balance-label { font-size: 12px; opacity: 0.8; }
  .balance-apu { font-size: 40px; font-weight: 800; margin: 8px 0; color: #FFD600; }
  .balance-usdt { font-size: 14px; opacity: 0.8; }

  .daily-claim {
    margin: 0 16px 16px;
    padding: 14px;
    background: #00C853;
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    width: calc(100% - 32px);
    transition: all 0.2s;
  }
  .daily-claim:disabled { background: #333; opacity: 0.6; }

  .btn-row { display: flex; gap: 10px; padding: 0 16px 20px; }
  .btn { flex: 1; padding: 14px; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; }
  .btn-primary { background: #FF8A00; color: #fff; }
  .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
  .page { display: none; padding: 0 16px; }
  .page.active { display: block; }
  .card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
  .card-header { display: flex; align-items: center; gap: 12px; }
  .card-icon { width: 48px; height: 48px; border-radius: 12px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .card-info { flex: 1; }
  .card-title { font-size: 15px; font-weight: 700; }
  .card-sub { font-size: 12px; opacity: 0.7; }
  .btn-get { padding: 10px 18px; background: #1877FF; border: none; border-radius: 10px; color: #fff; font-weight: 700; }
  .btn-get.orange { background: #FF8A00; }
  .btn-get:disabled { background: #333; opacity: 0.5; }
  .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(10,10,20,0.85); border-radius: 30px; padding: 8px; display: flex; gap: 12px; }
  .nav-item { text-align: center; font-size: 10px; opacity: 0.6; background: none; border: none; color: #fff; padding: 4px 6px; }
  .nav-item.active { opacity: 1; color: #FF8A00; }
  .nav-icon { font-size: 22px; display: block; }
  .nav-center { background: #FF3B30; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; }
</style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    Loading Ads...
  </div>

  <div id="app" style="display:none">
    <div class="topbar"><h1>AdsPayU</h1></div>

    <div class="balance-card">
      <div class="balance-label">YOUR BALANCE</div>
      <div class="balance-apu" id="coins">0 APU</div>
      <div class="balance-usdt" id="usdt">0.0000 USDT</div>
    </div>

    <button class="daily-claim" id="dailyClaimBtn" onclick="claimDaily()">🎁 CLAIM DAILY 50 APU</button>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="withdraw()">WITHDRAW</button>
      <button class="btn btn-secondary" onclick="swap()">SWAP</button>
    </div>

    <div id="home" class="page active">
      <div class="card">
        <div class="card-header">
          <div class="card-icon">🎯</div>
          <div class="card-info">
            <div class="card-title">GigaPub Ads</div>
            <div class="card-sub"><span id="gigaCount">0</span>/100 today</div>
          </div>
          <button class="btn-get" id="gigaBtn">Watch</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon">💰</div>
          <div class="card-info">
            <div class="card-title">Monetag Ads</div>
            <div class="card-sub"><span id="monetagCount">0</span>/100 today</div>
          </div>
          <button class="btn-get orange" id="monetagBtn">Watch</button>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <button class="nav-item active" onclick="showTab('home')"><span class="nav-icon">🏠</span>Home</button>
      <button class="nav-item" onclick="showTab('rank')"><span class="nav-icon">🏆</span>Rank</button>
      <button class="nav-item"><span class="nav-center">+</span></button>
    </div>
  </div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const COIN_VALUE = 0.000028;
const DAILY_LIMIT = 100;
let coins = parseInt(localStorage.getItem('coins') || 0);
let gigaWatched = parseInt(localStorage.getItem('gigaWatched') || 0);
let monetagWatched = parseInt(localStorage.getItem('monetagWatched') || 0);

// FORCE OPEN IN 2 SECONDS
setTimeout(function(){
  document.getElementById('loader').classList.add('hide');
  document.getElementById('app').style.display = 'block';
  updateUI();
  checkDaily();
}, 2000);

function updateUI() {
  const usdt = (coins * COIN_VALUE).toFixed(4);
  document.getElementById('coins').innerText = coins.toLocaleString() + ' APU';
  document.getElementById('usdt').innerText = usdt + ' USDT';
  document.getElementById('gigaCount').innerText = gigaWatched;
  document.getElementById('monetagCount').innerText = monetagWatched;
  
  if(gigaWatched >= DAILY_LIMIT) document.getElementById('gigaBtn').disabled = true;
  if(monetagWatched >= DAILY_LIMIT) document.getElementById('monetagBtn').disabled = true;
}

// FIXED DAILY CLAIM
function checkDaily() {
  const btn = document.getElementById('dailyClaimBtn');
  const today = new Date().toDateString();
  const lastDailyClaim = localStorage.getItem('lastDailyClaim'); // RELOAD FROM STORAGE
  
  if(lastDailyClaim === today) {
    btn.disabled = true;
    btn.innerText = "✅ CLAIMED TODAY";
    btn.style.background = "#333";
  } else {
    btn.disabled = false;
    btn.innerText = "🎁 CLAIM DAILY 50 APU";
    btn.style.background = "#00C853";
  }
}

function claimDaily() {
  const today = new Date().toDateString();
  const lastDailyClaim = localStorage.getItem('lastDailyClaim'); // CHECK AGAIN
  
  if(lastDailyClaim === today) {
    alert("You already claimed today!");
    return;
  }
  
  coins += 50;
  localStorage.setItem('coins', coins);
  localStorage.setItem('lastDailyClaim', today);
  
  updateUI();
  checkDaily();
  alert("+50 APU Claimed!");
}

document.getElementById('gigaBtn').onclick = function(){
  if(gigaWatched >= DAILY_LIMIT) return alert("Giga limit reached");
  if(typeof window.showGiga === 'function'){
    window.showGiga().then(function(){
      coins += 50; gigaWatched += 1;
      localStorage.setItem('coins', coins);
      localStorage.setItem('gigaWatched', gigaWatched);
      updateUI();
      alert("+50 APU");
    }).catch(function(e){ alert("No ads"); });
  } else { alert("Giga not loaded"); }
}

document.getElementById('monetagBtn').onclick = function(){
  if(monetagWatched >= DAILY_LIMIT) return alert("Monetag limit reached");
  if(typeof window.show_11258922 === 'function'){
    window.show_11258922().then(function(){
      coins += 50; monetagWatched += 1;
      localStorage.setItem('coins', coins);
      localStorage.setItem('monetagWatched', monetagWatched);
      updateUI();
      alert("+50 APU");
    }).catch(function(e){ alert("No ads"); });
  } else { alert("Monetag not loaded"); }
}

function showTab(id){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function withdraw(){ alert("Min 10000 APU"); }
function swap(){ alert("Coming soon"); }

// RESET DAILY
if(new Date().toDateString() !== localStorage.getItem('lastReset')){
  localStorage.setItem('gigaWatched', 0);
  localStorage.setItem('monetagWatched', 0);
  localStorage.setItem('lastReset', new Date().toDateString());
}
</script>
</body>
</html>
