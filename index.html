<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdsPayU VC</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- ✅ NEW GIGAPUB SCRIPT -->
  <script src="https://lib.gigapub.tech/gigapub.js"></script>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; background: #17212b; color: white; }
    h1 { color: #0088cc; }
   .balance { font-size: 24px; margin: 20px 0; color: #4CAF50; }
    button { padding: 15px 30px; font-size: 16px; background: #0088cc; color: white; border: none; border-radius: 10px; width: 90%; margin-top: 20px; cursor: pointer; }
    button:disabled { background: #555; cursor: not-allowed; }
    #status { color: #aaa; font-size: 14px; margin-top: 10px; min-height: 20px; }
  </style>
</head>
<body>
  <h1>AdsPayU VC 🇻🇨</h1>
  <p>Balance:</p>
  <div class="balance" id="balance">$0.0000</div>
  <button id="adBtn" onclick="showAd()">🎁 Watch Ad - $0.0006</button>
  <p id="status"></p>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    const userId = tg.initDataUnsafe.user?.id || "guest";
    let isLoading = false;

    // Load balance on start
    fetch(`https://adspayu-backend-5y7g.onrender.com/api/balance?user_id=${userId}`)
     .then(res => res.json())
     .then(data => {
        document.getElementById('balance').innerText = `$${data.balance.toFixed(4)}`;
      })

    function showAd() {
      if(isLoading) return;
      isLoading = true;

      const btn = document.getElementById('adBtn');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.innerText = "Loading ad... please wait";

      // ✅ USE ZONE NAME "main" NOT 7204
      window.showGiga("main")
       .then(() => {
          // USER WATCHED FULL AD
          status.innerText = "Ad completed! Crediting...";
          console.log("AD WATCHED:", userId);

          // Send to backend to credit
          fetch(`https://adspayu-backend-5y7g.onrender.com/api/credit?user_id=${userId}&amount=0.0006`)
           .then(res => res.json())
           .then(data => {
              status.innerText = `✅ $${data.credited} added! New balance: $${data.new_balance.toFixed(4)}`;
              document.getElementById('balance').innerText = `$${data.new_balance.toFixed(4)}`;
              btn.innerText = "⏰ Wait 10s";
            })
        })
       .catch(e => {
          console.log("GigaPub Error:", e);
          status.innerText = "😅 No ads available. Try again in 10-30 min";
          btn.innerText = "🎁 Watch Ad";
        })
       .finally(() => {
          isLoading = false;
          setTimeout(() => { 
            btn.disabled = false; 
            btn.innerText = "🎁 Watch Ad - $0.0006";
          }, 10000); // 10s cooldown
        });
    }
  </script>
</body>
</html>
