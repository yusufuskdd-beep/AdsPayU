<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AdsPayU</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { 
      font-family: Arial; 
      text-align: center; 
      padding: 20px; 
      background: #17212b; 
      color: white;
      margin: 0;
    }
    h1 { color: #0088cc; }
    button { 
      padding: 15px 30px; 
      font-size: 16px; 
      background: #0088cc; 
      color: white; 
      border: none; 
      border-radius: 10px; 
      margin: 10px;
      width: 90%;
      cursor: pointer;
    }
    button:active { background: #006699; }
    #adBox { margin-top: 20px; }
    iframe { width: 100%; height: 450px; border: none; border-radius: 10px; }
    .note { font-size: 12px; color: #aaa; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>AdsPayU</h1>
  <p>Earn $0.0006 per ad</p>
  
  <button id="watchBtn">🎁 Watch Ad</button>
  <div id="adBox"></div>
  
  <p class="note">Stay on the ad for 15 seconds. GigaPub will auto-credit you.</p>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const user = tg.initDataUnsafe.user;
    const userId = user ? user.id : "guest";

    document.getElementById('watchBtn').onclick = () => {
      // Load GigaPub Zone 7204 with user_id
      const adUrl = `https://link.gigapub.tech/7204?sub1=${userId}`;
      
      document.getElementById('adBox').innerHTML = `
        <iframe src="${adUrl}"></iframe>
      `;
      
      tg.HapticFeedback.impactOccurred('medium');
      alert('Ad loaded. Stay for 15s then close it.');
    }
  </script>
</body>
</html>
