<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdsPayU TEST</title>
<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="toast" class="toast">Toast</div>

<div id="app">
<div class="topbar"><h1>AdsPayU TEST</h1></div>

<div id="home" class="page active">
<div class="balance-card"><div class="balance-label">TEST</div><div class="balance-apu" id="coinsHome">0 APU</div></div>
<button class="btn btn-primary" id="testBtn">CLICK ME TO TEST</button>
</div>

<div class="bottom-nav">
<button class="nav-item active" id="homeNav"><span class="nav-icon">🏠</span>Home</button>
<button class="nav-item" id="minerNav"><span class="nav-icon">⚡</span>Miner</button>
</div>
</div>

<script>
function showToast(msg){const t=document.getElementById('toast');t.innerText=msg;t.className='toast show';setTimeout(()=>t.className='toast',2000)}

function init(){
    console.log("JS LOADED");
    showToast("JS Working!");
    
    document.getElementById('testBtn').onclick = () => {
        showToast("BUTTON WORKS!");
        document.getElementById('coinsHome').innerText = "1 APU";
    }
    
    document.getElementById('homeNav').onclick = () => showToast("Home Tab");
    document.getElementById('minerNav').onclick = () => showToast("Miner Tab");
}

window.onload = init;
</script>
</body>
</html>
