<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AdsPayU VC</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://ad.gigapub.tech/script?id=7204"></script>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; background: #17212b; color: white; }
    h1 { color: #0088cc; }
    button { padding: 15px 30px; font-size: 16px; background: #0088cc; color: white; border: none; border-radius: 10px; width: 90%; margin-top: 20px; cursor: pointer; }
    button:disabled { background: #555; cursor: not-allowed; }
    #status { color: #aaa; font-size: 14px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>AdsPayU VC 🇻🇨</h1>
  <p>Earn $0.0006 per ad</p>
  <button id="adBtn" onclick="showAd()">🎁 Watch Ad</button>
  <p id="status"></p>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    const userId = tg.initDataUnsafe.user?.id || "guest";
    let isLoading = false;

    function showAd() {
      if(isLoading) return;
      isLoading = true;
      
      const btn = document.getElementById('adBtn');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.innerText = "Loading ad... please wait 5s";

      window.showGiga()
        .then(() => {
          status.innerText = "Ad completed! Crediting $0.0006...";
          
          fetch(`https://adspayu-backend-5y7g.onrender.com/api/credit?user_id=${userId}&amount=0.0006`)
            .then(res => res.json())
            .then(data => {
              status.innerText = "✅ $0.0006 added! Come back in 10 min for next ad";
              btn.innerText = "⏰ Wait 10 min";
            })
        })
        .catch(e => {
          console.log("GigaPub Error:", e);
          // THIS IS THE KEY FIX
          if(e.message.includes("No ads") || e.message.includes("loading")) {
            status.innerText = "😅 No ads available right now. Try again in 10-30 min";
          } else {
            status.innerText = "Error loading ad. Try again later";
          }
          btn.innerText = "🎁 Watch Ad";
        })
        .finally(() => {
          isLoading = false;
          setTimeout(() => { btn.disabled = false; }, 10000); // 10s cooldown
        });
    }
  </script>
</body>
</html>
