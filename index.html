<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  body { font-family: system-ui; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); margin: 0; padding: 16px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab { flex: 1; padding: 10px; border: none; border-radius: 10px; background: var(--tg-theme-secondary-bg-color); }
  .tab.active { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); }
  .page { display: none; }
  .page.active { display: block; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); font-size: 16px; }
</style>
</head>
<body>
  <div class="tabs">
    <button class="tab active" onclick="showTab('home')">Home</button>
    <button class="tab" onclick="showTab('referral')">Referral</button>
    <button class="tab" onclick="showTab('leaderboard')">Leaderboard</button>
  </div>

  <div id="home" class="page active">
    <h2>Welcome</h2>
    <p>Earn coins by watching ads</p>
    <button class="btn" onclick="watchAd()">Watch Ad +10</button>
    <p id="coins">Coins: 0</p>
  </div>

  <div id="referral" class="page">
    <h2>Referral</h2>
    <p>Invite friends and get 50 coins each</p>
    <button class="btn" onclick="copyLink()">Copy Referral Link</button>
    <p id="refCount">Referred: 0</p>
  </div>

  <div id="leaderboard" class="page">
    <h2>Leaderboard</h2>
    <ol id="board"></ol>
  </div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let coins = parseInt(localStorage.getItem('coins') || 0);
let referrals = parseInt(localStorage.getItem('referrals') || 0);
document.getElementById('coins').innerText = `Coins: ${coins}`;
document.getElementById('refCount').innerText = `Referred: ${referrals}`;

function showTab(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
  if(id === 'leaderboard') loadLeaderboard();
}

function watchAd() {
  // Replace this with your real ad SDK call
  alert("Ad would play here");
  coins += 10;
  localStorage.setItem('coins', coins);
  document.getElementById('coins').innerText = `Coins: ${coins}`;
}

function copyLink() {
  const userId = tg.initDataUnsafe?.user?.id || "demo";
  const link = `https://t.me/YourBotName?startapp=ref_${userId}`;
  navigator.clipboard.writeText(link);
  tg.showAlert("Referral link copied!");
}

function loadLeaderboard() {
  // Demo data. Later replace with fetch from your backend
  const demo = [
    {name: "Alex", coins: 1200},
    {name: "You", coins: coins},
    {name: "Sam", coins: 800}
  ].sort((a,b) => b.coins - a.coins);
  
  document.getElementById('board').innerHTML = demo.map(u => `<li>${u.name} - ${u.coins}</li>`).join('');
}
</script>
</body>
</html>
