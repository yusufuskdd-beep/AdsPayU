<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AdsPayU VC</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <!-- 1. ADD GIGAPUB SCRIPT WITH YOUR ID 7204 -->
  <script src="https://ad.gigapub.tech/script?id=7204"></script>
  
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; background: #17212b; color: white; }
    h1 { color: #0088cc; }
    button { padding: 15px 30px; font-size: 16px; background: #0088cc; color: white; border: none; border-radius: 10px; width: 90%; margin-top: 20px; cursor: pointer; }
    #status { color: #aaa; font-size: 12px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>AdsPayU VC 🇻🇨</h1>
  <p>Earn $0.0006 per ad</p>
  <button onclick="showAd()">🎁 Watch Ad</button>
  <p id="status"></p>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    const userId = tg.initDataUnsafe.user?.id || "guest";

    function showAd() {
      document.getElementById('status').innerText = "Loading ad...";
      
      // 2. CALL THE GIGAPUB POPUP
      window.showGiga()
        .then(() => {
          // AD WATCHED SUCCESSFULLY
          document.getElementById('status').innerText = "Ad completed! Crediting $0.0006...";
          
          // 3. SEND TO YOUR BACKEND
          fetch(`https://adspayu-backend-5y7g.onrender.com/api/credit?user_id=${userId}&amount=0.0006`)
            .then(res => res.json())
            .then(data => {
              document.getElementById('status').innerText = "✅ $0.0006 added to your balance!";
            })
        })
        .catch(e => {
          // NO ADS / ERROR
          document.getElementById('status').innerText = "No ads available. Try again in 5 min.";
          console.log("GigaPub Error:", e);
        });
    }
  </script>
</body>
</html>
