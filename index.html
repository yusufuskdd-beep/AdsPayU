<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AdsPayU VC</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; background: #17212b; color: white; }
    h1 { color: #0088cc; }
    button { padding: 15px 30px; font-size: 16px; background: #0088cc; color: white; border: none; border-radius: 10px; width: 90%; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>AdsPayU VC 🇻🇨</h1>
  <p>Earn $0.0006 per ad</p>
  
  <!-- CLICK DIRECTLY ON BUTTON -->
  <button onclick="watchAd()">🎁 Watch Ad</button>
  <p id="status"></p>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const userId = tg.initDataUnsafe.user?.id || "guest";

    function watchAd() {
      const adUrl = `https://link.gigapub.tech/7304?sub1=${userId}`;
      document.getElementById('status').innerText = "Opening ad...";
      
      tg.HapticFeedback.impactOccurred('light');
      
      // TRY BOTH METHODS. ANDROID = openTelegramLink, IPHONE = openLink
      try {
        tg.openTelegramLink(adUrl);
      } catch(e) {
        tg.openLink(adUrl);
      }
    }
  </script>
</body>
</html>
