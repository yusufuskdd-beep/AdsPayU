<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>AdsPayU</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="toast" class="toast"></div>

<div class="modal" id="adminPassModal">
  <div class="modal-content">
    <div class="modal-title">🔒 ADMIN LOGIN</div>
    <div class="input-group"><label>Enter Password</label><input type="password" id="adminPassInput" placeholder="admin123"></div>
    <div class="modal-btns"><button class="modal-btn btn-cancel" onclick="closeAdminPass()">CANCEL</button><button class="modal-btn btn-confirm" onclick="checkAdminPass()">LOGIN</button></div>
  </div>
</div>

<div id="wallet" class="page">
  <div class="balance-card">
    <div class="balance-label">YOUR BALANCE</div>
    <div class="balance-apu" id="coinsWallet">0 APU</div>
    <div class="balance-usdt" id="usdtWallet">0.0000 USDT</div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="connectBtn">🔗 CONNECT TON</button>
    <button class="btn btn-secondary" id="depositBtn">DEPOSIT</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="withdrawBtn">WITHDRAW</button>
    <button class="btn btn-secondary" onclick="openSwap()">SWAP</button>
  </div>
</div>

<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<script src="config.js"></script>
<script src="ton.js"></script>
<script src="miners.js"></script>
<script src="app.js"></script>
<script src="https://ad.gigapub.tech/script?id=7204" async></script>
<script src='//libtl.com/sdk.js' data-zone='11258922' data-sdk='show_11258922' async></script>
</body>
</html>
