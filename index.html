<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdsPayU</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src='https://lib.gigapub.tech/gigapub.js'></script>
<script src='//libtl.com/sdk.js' data-zone='11258922' data-sdk='show_11258922'></script>
<style>
  body { font-family: Arial; background: #0f172a; color: white; text-align: center; padding: 20px; }
  .card { background: #1e293b; padding: 20px; border-radius: 15px; margin: 15px 0; }
  .balance { font-size: 32px; color: #22c55e; font-weight: bold; }
  .btn { width: 90%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
  .btn-giga { background: linear-gradient(90deg, #3b82f6, #06b6d4); color: white; }
  .btn-monetag { background: linear-gradient(90deg, #f97316, #ec4899); color: white; }
  .btn-withdraw { background: #22c55e; color: white; }
  input { width: 80%; padding: 12px; border-radius: 8px; border: none; margin: 10px 0; }
  #status { margin-top: 10px; font-size: 14px; color: #fbbf24; }
</style>
</head>
<body>

<h2>🚀 AdsPayU</h2>

<div class="card">
  <p>Your Balance</p>
  <div class="balance">$<span id="balance">0.0000</span></div>
</div>

<div class="card">
  <p><b>Watch Ads & Earn</b></p>
  <button class="btn btn-giga" onclick="showGigaAd()">📺 Watch GigaPub +$0.0006</button>
  <button class="btn btn-monetag" onclick="showMonetagAd()">🎁 Watch Monetag +$0.0006</button>
  <p id="status"></p>
</div>

<div class="card">
  <p><b>Withdraw to TON</b></p>
  <input id="wallet" placeholder="UQ... EQ... kQ... TON Wallet">
  <button class="btn btn-withdraw" onclick="withdraw()">💸 Withdraw $1.00 Min</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
const user = tg.initDataUnsafe.user;
const user_id = user?.id || 'guest';

const API = "https://adspayu-backend-5y7g.onrender.com"; // ✅ YOUR BACKEND
const GIGAPUB_ZONE = "1076478";

let balance = 0;

async function loadBalance() {
  try {
    const res = await fetch(`${API}/api/balance?user_id=${user_id}`);
    const data = await res.json();
    balance = Number(data.balance) || 0;
    document.getElementById('balance').innerText = balance.toFixed(4);
  } catch(e) {
    document.getElementById('status').innerText = "❌ Can't connect to server. Wake it up at " + API;
  }
}

function showGigaAd() {
  document.getElementById('status').innerText = "Loading GigaPub ad...";
  showGigaPub(GIGAPUB_ZONE).then(() => {
    creditUser(0.0006, 'GigaPub');
  }).catch(() => {
    document.getElementById('status').innerText = "❌ GigaPub: No ads";
  });
}

function showMonetagAd() {
  document.getElementById('status').innerText = "Loading Monetag ad...";
  show_11258922().then(() => {
    creditUser(0.0006, 'Monetag');
  }).catch(() => {
    document.getElementById('status').innerText = "❌ Monetag: No ads";
  });
}

async function creditUser(amount, network) {
  const res = await fetch(`${API}/api/credit?user_id=${user_id}&amount=${amount}`);
  const data = await res.json();
  balance = data.new_balance;
  document.getElementById('balance').innerText = Number(balance).toFixed(4);
  document.getElementById('status').innerText = `✅ +$${amount} from ${network}`;
}

async function withdraw() {
  const wallet = document.getElementById('wallet').value;
  const res = await fetch(`${API}/api/withdraw?user_id=${user_id}&wallet=${wallet}`);
  const data = await res.json();
  alert(data.message);
}

loadBalance();
</script>

</body>
</html>
