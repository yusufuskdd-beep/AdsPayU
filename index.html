<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>AdsPayU</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #0A2AFF 0%, #0018B3 50%, #000A4D 100%);
    color: #fff; padding-bottom: 90px; min-height: 100vh; background-attachment: fixed;
  }
  #loader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0A2AFF url('./splash.jpg') no-repeat center; background-size: cover; z-index: 9999; transition: opacity 0.6s ease; }
  #loader.hide { opacity: 0; pointer-events: none; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
  .topbar h1 { font-size: 18px; font-weight: 700; }
  .lang { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 6px 10px; border-radius: 20px; font-size: 13px; font-weight: 600; }
  .balance-section { padding: 0 16px 16px; }
  .balance-label { font-size: 12px; opacity: 0.7; }
  .balance { font-size: 42px; font-weight: 800; }
  .balance span { font-size: 18px; opacity: 0.8; }
  .usd { font-size: 13px; opacity: 0.7; margin-top: 4px; }
  .btn-row { display: flex; gap: 10px; padding: 0 16px 20px; }
  .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .btn-primary { background: linear-gradient(90deg, #FF8A00 0%, #FF6A00 100%); color: #fff; box-shadow: 0 4px 20px rgba(255,138,0,0.4); }
  .btn-secondary { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
  .page { display: none; padding: 0 16px; }
  .page.active { display: block; animation: fade .25s ease; }
  @keyframes fade { from {opacity:0; transform: translateY(4px)} to {opacity:1; transform: translateY(0)} }
  .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 14px; margin-bottom: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .card-header { display: flex; align-items: center; gap: 12px; }
  .card-icon { width: 48px; height: 48px; border-radius: 12px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .card-info { flex: 1; }
  .card-title { font-size: 15px; font-weight: 700; }
  .card-sub { font-size: 12px; opacity: 0.7; }
  .btn-get { padding: 10px 18px; background: linear-gradient(90deg, #1877FF 0%, #0A5FFF 100%); border: none; border-radius: 10px; color: #fff; font-weight: 700; }
  .btn-get:disabled { background: #444; opacity: 0.5; }
  .list-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(10,10,20,0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 8px; display: flex; gap: 20px; }
  .nav-item { text-align: center; font-size: 10px; opacity: 0.6; background: none; border: none; color: #fff; cursor: pointer; }
  .nav-item.active { opacity: 1; color: #FF8A00; }
  .nav-icon { font-size: 22px; display: block; }
  .nav-center { background: linear-gradient(135deg, #FF3B30 0%, #FF6A00 100%); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; box-shadow: 0 4px 20px rgba(255,59,48,0.4); }
  .loading { opacity: 0.6; pointer-events: none; }
</style>
</head>
<body>

  <div id="loader"></div>

  <div id="app" style="display:none">
    <div class="topbar">
      <h1>AdsPayU</h1>
      <div class="lang">🇬🇧 EN</div>
    </div>

    <div class="balance-section">
      <div class="balance-label">BALANCE</div>
      <div class="balance"><span id="coins">0</span> <span>APU</span></div>
      <div class="usd">🪙 ~$<span id="usd">0.00</span></div>
    </div>

    <div id="home" class="page active">
      <div class="btn-row">
        <button class="btn btn-primary" onclick="withdraw()">WITHDRAW</button>
        <button class="btn btn-secondary" onclick="swap()">SWAP</button>
      </div>
      
      <div class="card">
        <div class="card-header">
          <div class="card-icon">📺</div>
          <div class="card-info">
            <div class="card-title">Watch Ad</div>
            <div class="card-sub">Reward: 50 APU | <span id="adLimit">0</span>/50 today</div>
          </div>
          <button class="btn-get" id="watchBtn" onclick="showAd()">Loading Ads...</button>
        </div>
      </div>
    </div>

    <div id="friends" class="page">...</div>
    <div id="mission" class="page">...</div>
    <div id="rank" class="page">...</div>
    <div id="add" class="page">
      <div class="card">
        <h3>Quick Earn</h3>
        <button class="btn btn-primary" id="quickAdBtn" style="margin-top:10px;" onclick="showAd()">Loading...</button>
        <button class="btn btn-secondary" style="margin-top:10px;" onclick="claimDaily()">Daily Bonus +25</button>
      </div>
    </div>

    <div class="bottom-nav">
      <button class="nav-item active" onclick="showTab('home')"><span class="nav-icon">🏠</span>Home</button>
      <button class="nav-item" onclick="showTab('friends')"><span class="nav-icon">👥</span>Friends</button>
      <button class="nav-item" onclick="showTab('mission')"><span class="nav-icon">📋</span>Mission</button>
      <button class="nav-item" onclick="showTab('rank')"><span class="nav-icon">🏆</span>Rank</button>
      <button class="nav-item" onclick="showTab('add')"><span class="nav-center">+</span></button>
    </div>
  </div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.setBackgroundColor('#000A4D');

let adsReady = false;
const GIGA_TOKEN = "main";

// 1. LOAD GIGAPUB SDK DYNAMICALLY
function loadGigaSDK() {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdn.gigapub.tech/sdk.js';
    script.onload = () => resolve();
    script.onerror = () => reject();
    document.head.appendChild(script);
  });
}

// 2. FORCE START APP AFTER 4S
setTimeout(() => {
  document.getElementById('loader').classList.add('hide');
  document.getElementById('app').style.display = 'block';
  initAds();
}, 4000);

async function initAds() {
  try {
    await loadGigaSDK();
    // Wait 500ms for SDK to attach to window
    setTimeout(() => {
      if(typeof window.showGiga === 'function') {
        adsReady = true;
        enableButtons();
        console.log("GigaPub Loaded");
      } else {
        throw new Error("SDK not attached");
      }
    }, 500);
  } catch(e) {
    console.log("GigaPub failed, enabling test mode");
    enableButtons();
    tg.showAlert("Ads server slow. You can still test, but no real ads will show.");
  }
}

function enableButtons() {
  document.getElementById('watchBtn').innerText = "Get APU";
  document.getElementById('quickAdBtn').innerText = "Watch Ad +50";
  document.getElementById('watchBtn').disabled = false;
  document.getElementById('quickAdBtn').disabled = false;
}

// DATA
let coins = parseInt(localStorage.getItem('coins') || 0);
let adWatched = parseInt(localStorage.getItem('adWatched') || 0);
let referrals = parseInt(localStorage.getItem('referrals') || 0);
let lastDaily = localStorage.getItem('lastDaily') || 0;
const COIN_VALUE = 0.000028;

function updateUI() {
  document.getElementById('coins').innerText = coins;
  document.getElementById('usd').innerText = (coins * COIN_VALUE).toFixed(2);
  document.getElementById('adLimit').innerText = adWatched;
  if(adWatched >= 50) {
    document.getElementById('watchBtn').disabled = true;
    document.getElementById('quickAdBtn').disabled = true;
    document.getElementById('watchBtn').innerText = "Limit";
    document.getElementById('quickAdBtn').innerText = "Limit";
  }
}
updateUI();

// 3. SHOW AD FUNCTION WITH CHECK
function showAd() {
  if(adWatched >= 50) return tg.showAlert("Daily ad limit reached");
  
  if(!adsReady || typeof window.showGiga !== 'function') {
    // TEST MODE: Give coins anyway so you can test UI
    coins += 50;
    adWatched += 1;
    localStorage.setItem('coins', coins);
    localStorage.setItem('adWatched', adWatched);
    updateUI();
    return tg.showAlert("TEST MODE: +50 APU. Real ads not loaded yet.");
  }
  
  document.getElementById('watchBtn').classList.add('loading');
  document.getElementById('quickAdBtn').classList.add('loading');
  
  window.showGiga(GIGA_TOKEN)
  .then(() => { 
    coins += 50;
    adWatched += 1;
    localStorage.setItem('coins', coins);
    localStorage.setItem('adWatched', adWatched);
    updateUI();
    tg.HapticFeedback.notificationOccurred('success');
    tg.showPopup({title: "Earned!", message: "+50 APU"});
  })
  .catch(e => { 
    if(e === 'No ads') tg.showAlert("No ads available. Try again in 1 hour.");
    else if(e === 'Skipped') tg.showAlert("Ad skipped. No reward.");
    else tg.showAlert("Ad error: " + e);
  })
  .finally(() => {
    document.getElementById('watchBtn').classList.remove('loading');
    document.getElementById('quickAdBtn').classList.remove('loading');
  });
}

// OTHER FUNCTIONS
function showTab(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.currentTarget.classList.add('active');
}

function claimDaily() {
  const today = new Date().toDateString();
  if(lastDaily === today) return tg.showAlert("Already claimed today");
  coins += 25;
  lastDaily = today;
  localStorage.setItem('coins', coins);
  localStorage.setItem('lastDaily', today);
  updateUI();
  tg.showAlert("Daily bonus claimed! +25 APU");
}

function withdraw() { tg.showAlert("Withdraw page coming soon"); }
function swap() { tg.showAlert("Swap page coming soon"); }

// Reset daily
if(!localStorage.getItem('lastReset') || new Date().toDateString() !== localStorage.getItem('lastReset')) {
  localStorage.setItem('adWatched', 0);
  localStorage.setItem('lastReset', new Date().toDateString());
}
</script>
</body>
</html>
