<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AdsPayU v11.7</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --bg: #0a0f1e; --card: #111827; --text: #e5e7eb; --muted: #9ca3af; --danger: #ef4444; --warning: #f59e0b; --giga: #7c3aed; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }

    #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #7c3aed, #5b21b6); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    #splash.hide { opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
    #splash h1 { font-size: 32px; margin-bottom: 10px; color: #fff; }
 .loader { border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid #fff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-top: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); }

    #app { display: none; }
 .header { text-align: center; padding: 20px; background: linear-gradient(135deg, #7c3aed, #5b21b6); }
 .header h1 { font-size: 22px; color: #fff; }
 .balance-card { background: var(--card); margin: -30px 16px 20px; padding: 20px; border-radius: 16px; text-align: center; }
 .label { color: var(--muted); font-size: 14px; }
 .amount { font-size: 32px; font-weight: 700; color: var(--giga); margin: 8px 0; }
 .stats { display: flex; gap: 10px; margin-top: 12px; }
 .stat-box { flex: 1; background: #1f2937; padding: 10px; border-radius: 10px; }
 .stat-val { font-size: 18px; font-weight: 700; color: var(--giga); }

 .tabs { display: flex; background: var(--card); margin: 0 16px; border-radius: 12px; padding: 4px; }
 .tab-btn { flex: 1; padding: 10px 8px; border: none; background: transparent; color: var(--muted); border-radius: 8px; font-weight: 600; font-size: 13px; }
 .tab-btn.active { background: var(--giga); color: #fff; }
 .tab-content { display: none; padding: 20px 16px; }
 .tab-content.active { display: block; }

    button.primary { background: var(--giga); color: #fff; border: none; padding: 16px; font-size: 16px; font-weight: 700; border-radius: 12px; width: 100%; cursor: pointer; margin-bottom: 10px; }
    button:disabled { background: #374151; color: var(--muted); cursor: not-allowed; }
 .card { background: var(--card); padding: 16px; border-radius: 12px; margin-bottom: 12px; }
 .ref-link { background: #1f2937; padding: 12px; border-radius: 8px; word-break: break-all; font-size: 13px; margin: 10px 0; }
 input { width: 100%; padding: 12px; background: #1f2937; border: 1px solid #374151; border-radius: 8px; color: var(--text); margin: 8px 0; }
  </style>
</head>
<body>
  <div id="splash"><h1>💰 AdsPayU</h1><div class="loader"></div><p style="color:#fff; margin-top:8px;">Powered by GigaPub</p></div>

  <div id="app">
    <div class="header"><h1>💰 AdsPayU Rewards</h1></div>

    <div class="balance-card">
      <div class="label">Your Balance</div>
      <div class="amount" id="balance">$0.0000</div>
      <div class="label">Min withdraw: $1.00</div>
      <div class="stats">
        <div class="stat-box"><div class="stat-val" id="adsCount">0/400</div><div class="label">Today</div></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="openTab('earn', event)">Earn</button>
      <button class="tab-btn" onclick="openTab('withdraw', event)">Withdraw</button>
    </div>

    <div id="earn" class="tab-content active">
      <button id="dailyBtn" class="primary" style="background:var(--warning); color:#000;">🎁 Claim $0.05 TEST</button>
      <button id="gigaBtn" class="primary" disabled>Loading GigaPub...</button>
      <p style="text-align:center; color:var(--muted); margin-top:12px; font-size:13px;">400 ads per day limit</p>
    </div>

    <div id="withdraw" class="tab-content"><div class="card"><h3>Withdraw Funds</h3><input type="text" id="wallet" placeholder="Enter Wallet"><button class="primary" onclick="requestWithdraw()">Request Withdraw</button></div></div>
  </div>

  <script src="https://cdn.gigapub.tech/sdk.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();
    const user = tg.initDataUnsafe.user || {id: Date.now(), first_name: "Guest"};
    
    const DAILY_LIMIT = 400;
    const REWARD = 0.0006; 
    const DAILY_REWARD = 0.05;
    let gigaReady = false;

    function getToday() { return new Date().toISOString().split('T')[0]; }
    let data = JSON.parse(localStorage.getItem('adsPayUData')) || { date: getToday(), adsWatched: 0, balance: 0 };
    if (data.date!== getToday()) { data = {...data, date: getToday(), adsWatched: 0 }; }

    function saveData() { localStorage.setItem('adsPayUData', JSON.stringify(data)); }

    function creditUser() {
      if (data.adsWatched >= DAILY_LIMIT) return false;
      data.adsWatched += 1; 
      data.balance += REWARD;
      saveData(); updateUI();
      tg.showAlert(`GigaPub Ad finished ✅ \n+$${REWARD.toFixed(4)} credited!`);
      return true;
    }

    function updateUI() {
      document.getElementById('adsCount').innerText = `${data.adsWatched}/${DAILY_LIMIT}`;
      document.getElementById('balance').innerText = '$' + data.balance.toFixed(4);
      
      const gigaBtn = document.getElementById('gigaBtn');
      if(data.adsWatched >= DAILY_LIMIT) { 
        gigaBtn.disabled = true; 
        gigaBtn.innerText = "Daily Limit Reached"; 
      } else if(gigaReady) {
        gigaBtn.disabled = false;
        gigaBtn.innerText = "Watch GigaPub Ad +$0.0006";
      }
    }

    // INIT GIGAPUB SDK
    window.addEventListener('load', () => { 
      setTimeout(() => { 
        document.getElementById('splash').classList.add('hide'); 
        document.getElementById('app').style.display = 'block'; 
        updateUI(); 
        
        // Initialize GigaPub
        if(window.GigaPubSDK) {
          window.GigaPubSDK.init({
            appId: "7204",
            onInitSuccess: () => {
              gigaReady = true;
              updateUI();
              console.log("GigaPub Ready");
            },
            onInitError: (err) => {
              tg.showAlert("GigaPub Init Failed: " + err);
            }
          });
        } else {
          tg.showAlert("GigaPub SDK not loaded. Check internet");
        }
      }, 800); 
    });

    function openTab(tabName, evt) { 
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); 
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
      document.getElementById(tabName).classList.add('active'); 
      evt.target.classList.add('active'); 
    }

    document.getElementById('dailyBtn').onclick = () => {
      data.balance += DAILY_REWARD;
      saveData(); updateUI();
      tg.showAlert(`🎁 $0.05 Added! \nTotal: $${data.balance.toFixed(4)}`);
    }

    // GIGAPUB WITH PROPER CALL
    document.getElementById('gigaBtn').onclick = async () => {
      if(!gigaReady) return tg.showAlert("GigaPub still loading...");
      if(data.adsWatched >= DAILY_LIMIT) return tg.showAlert("Daily limit reached");
      
      document.getElementById('gigaBtn').disabled = true;
      document.getElementById('gigaBtn').innerText = "Loading Ad...";
      
      try {
        window.GigaPubSDK.showAd({
          onReward: () => { 
            creditUser(); 
            document.getElementById('gigaBtn').disabled = false; 
            document.getElementById('gigaBtn').innerText = "Watch GigaPub Ad +$0.0006";
          },
          onClose: () => { 
            document.getElementById('gigaBtn').disabled = false; 
            document.getElementById('gigaBtn').innerText = "Watch GigaPub Ad +$0.0006";
          },
          onError: (err) => {
            tg.showAlert("Ad Error: " + err);
            document.getElementById('gigaBtn').disabled = false;
            document.getElementById('gigaBtn').innerText = "Watch GigaPub Ad +$0.0006";
          }
        });
      } catch(e) {
        tg.showAlert("SDK Error: " + e.message);
        document.getElementById('gigaBtn').disabled = false;
      }
    }

    function requestWithdraw() { const wallet = document.getElementById('wallet').value; if(!wallet) return alert("Enter wallet"); if(data.balance < 1.00) return alert("Min $1.00"); alert("Request sent!"); }
  </script>
</body>
</html>
