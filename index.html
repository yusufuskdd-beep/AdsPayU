<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>AdsPayU</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #000;
    color: #fff;
    padding-bottom: 90px;
  }

  /* LOADER */
  #loader {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #000 url('./splash.jpg') no-repeat center;
    background-size: cover;
    z-index: 9999;
    transition: opacity 0.6s ease;
  }
  #loader.hide { opacity: 0; pointer-events: none; }

  /* HEADER */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
  }
  .topbar h1 { font-size: 18px; font-weight: 700; }
  .lang {
    background: #1A1A1A; padding: 6px 10px; border-radius: 20px;
    display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600;
  }

  /* BALANCE */
  .balance-section { padding: 0 16px 16px; }
  .balance-label { font-size: 12px; opacity: 0.6; margin-bottom: 4px; }
  .balance { font-size: 42px; font-weight: 800; display: flex; align-items: baseline; gap: 8px; }
  .balance span { font-size: 18px; opacity: 0.7; }
  .usd { font-size: 13px; opacity: 0.6; display: flex; align-items: center; gap: 4px; margin-top: 4px; }

  /* BUTTONS */
  .btn-row { display: flex; gap: 10px; padding: 0 16px 20px; }
  .btn {
    flex: 1; padding: 14px; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .btn-primary { background: #1877FF; color: #fff; }
  .btn-secondary { background: #1A1A1A; color: #fff; }

  /* CONTEST BANNER */
  .contest {
    margin: 0 16px 20px;
    background: linear-gradient(135deg, #1a2e1a 0%, #0d1a0d 100%);
    border-radius: 16px;
    padding: 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .contest-left { display: flex; flex-direction: column; gap: 4px; }
  .contest-tag { font-size: 11px; color: #FFD700; font-weight: 700; }
  .contest-title { font-size: 18px; font-weight: 800; }
  .contest-sub { font-size: 12px; opacity: 0.7; }
  .contest-right { text-align: right; }
  .prize { font-size: 20px; font-weight: 800; }
  .prize-sub { font-size: 11px; opacity: 0.7; }

  /* TABS */
  .tabs { display: flex; gap: 8px; padding: 0 16px 16px; }
  .tab {
    flex: 1; padding: 10px; background: #1A1A1A; border: none;
    border-radius: 10px; color: #888; font-weight: 600; font-size: 14px;
  }
  .tab.active { background: #2A2A2A; color: #fff; }

  /* SECTION TITLE */
  .section { padding: 0 16px 8px; text-align: center; }
  .section h2 { font-size: 16px; font-weight: 800; }
  .section p { font-size: 12px; opacity: 0.6; margin-top: 4px; }

  /* AD CARD */
  .ad-card {
    margin: 0 16px 12px;
    background: #111;
    border-radius: 16px;
    padding: 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .ad-icon { width: 48px; height: 48px; border-radius: 12px; background: #1A1A1A; }
  .ad-info { flex: 1; }
  .ad-label { font-size: 11px; opacity: 0.6; }
  .ad-name { font-size: 15px; font-weight: 700; margin: 2px 0 6px; }
  .ad-reward { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
  .ad-limit { font-size: 11px; opacity: 0.6; text-align: right; }
  .btn-get { padding: 10px 18px; background: #1877FF; border: none; border-radius: 10px; color: #fff; font-weight: 700; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #1A1A1A; border-radius: 30px; padding: 8px;
    display: flex; gap: 20px;
  }
  .nav-item { text-align: center; font-size: 10px; opacity: 0.5; background: none; border: none; color: #fff; }
  .nav-item.active { opacity: 1; }
  .nav-icon { font-size: 22px; display: block; }
  .nav-center {
    background: #FF3B30; width: 50px; height: 50px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800;
  }
</style>
</head>
<body>

  <div id="loader"></div>

  <div id="app" style="display:none">
    <!-- TOPBAR -->
    <div class="topbar">
      <h1>AdsPayU</h1>
      <div class="lang">🇬🇧 EN</div>
    </div>

    <!-- BALANCE -->
    <div class="balance-section">
      <div class="balance-label">BALANCE</div>
      <div class="balance"><span id="coins">0</span> <span>APU</span></div>
      <div class="usd">🪙 ~$<span id="usd">0.00</span></div>
    </div>

    <!-- BUTTONS -->
    <div class="btn-row">
      <button class="btn btn-primary" onclick="withdraw()">WITHDRAW</button>
      <button class="btn btn-secondary" onclick="swap()">SWAP</button>
    </div>

    <!-- CONTEST BANNER -->
    <div class="contest">
      <div class="contest-left">
        <div class="contest-tag">🏆 WEEKLY CONTEST</div>
        <div class="contest-title">Top Inviters</div>
        <div class="contest-sub">Take the Prize</div>
      </div>
      <div class="contest-right">
        <div class="prize">$10</div>
        <div class="prize-sub">Pool Prize</div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active">Daily Adz</button>
      <button class="tab">Premium Adz</button>
    </div>

    <!-- SECTION -->
    <div class="section">
      <h2>VIEWING ADS</h2>
      <p>Get paid for watching short Ads on Telegram.</p>
    </div>

    <!-- AD CARD -->
    <div class="ad-card">
      <div class="ad-icon"></div>
      <div class="ad-info">
        <div class="ad-label">Sponsored by</div>
        <div class="ad-name">AdsPayU</div>
        <div class="ad-reward">🪙 <span id="reward">50</span> APU</div>
      </div>
      <div>
        <div class="ad-limit">AD LIMIT<br><span id="adLimit">0</span>/50</div>
        <button class="btn-get" onclick="watchAd()">Get APU</button>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
      <button class="nav-item active"><span class="nav-icon">🏠</span>Home</button>
      <button class="nav-item"><span class="nav-icon">👥</span>Friends</button>
      <button class="nav-item"><span class="nav-icon">📋</span>Mission</button>
      <button class="nav-item"><span class="nav-icon">🏆</span>Rank</button>
      <button class="nav-item"><span class="nav-center">+</span></button>
    </div>
  </div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.setBackgroundColor('#000');

// SPLASH
setTimeout(() => {
  document.getElementById('loader').classList.add('hide');
  document.getElementById('app').style.display = 'block';
}, 3000);

// DATA
let coins = parseInt(localStorage.getItem('coins') || 0);
let adWatched = parseInt(localStorage.getItem('adWatched') || 0);
const COIN_VALUE = 0.000028; // 1 APU = $0.000028

function updateUI() {
  document.getElementById('coins').innerText = coins;
  document.getElementById('usd').innerText = (coins * COIN_VALUE).toFixed(2);
  document.getElementById('adLimit').innerText = adWatched;
}
updateUI();

function watchAd() {
  if(adWatched >= 50) return tg.showAlert("Daily ad limit reached");
  tg.HapticFeedback.impactOccurred('light');
  coins += 50;
  adWatched += 1;
  localStorage.setItem('coins', coins);
  localStorage.setItem('adWatched', adWatched);
  updateUI();
  tg.showPopup({title: "Earned!", message: "+50 APU"});
}

function withdraw() { tg.showAlert("Withdraw coming soon"); }
function swap() { tg.showAlert("Swap coming soon"); }
</script>
</body>
</html>
