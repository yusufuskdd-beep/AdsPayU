<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//lib.gigapub.tech/tag.min.js'></script>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 50px;
            background: #1a1a1a;
            color: white;
        }
        #watchBtn {
            background: #2AABEE;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
        }
        #balance { font-size: 24px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="balance">Balance: 0 Coins</div>
    <button id="watchBtn">Watch Ad +10 Coins</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Make app full screen
        
        let userId = tg.initDataUnsafe.user?.id;
        let balance = 0;

        // INIT GIGAPUB
        GigaPub.init({
            appId: 'YOUR_APP_ID_HERE', // Replace this
            zoneId: 'YOUR_ZONE_ID_HERE' // Replace this
        });

        document.getElementById('watchBtn').onclick = () => {
            GigaPub.showRewardedAd({
                onReward: () => {
                    balance += 10;
                    document.getElementById('balance').innerText = `Balance: ${balance} Coins`;
                    // TODO: Send this to your backend
                    alert('You earned 10 coins!');
                },
                onError: (err) => {
                    alert('Ad failed to load. Try again.');
                }
            });
        };
    </script>
</body>
</html>
