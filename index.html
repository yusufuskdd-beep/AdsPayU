<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://ad.gigapub.tech/script?id=7204"></script>
<script src='//libtl.com/sdk.js' data-zone='11258922' data-sdk='show_11258922'></script>
<title>AdsPayU</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(180deg, #0A2AFF 0%, #0018B3 50%, #000A4D 100%); color: #fff; padding-bottom: 90px; min-height: 100vh; background-attachment: fixed; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; position: sticky; top: 0; background: rgba(0,10,77,0.8); backdrop-filter: blur(20px); z-index: 10; }
.topbar h1 { font-size: 18px; font-weight: 700; }
.balance-card { margin: 16px; padding: 24px; background: linear-gradient(135deg, rgba(255,138,0,0.25) 0%, rgba(24,119,255,0.25) 100%); border: 1px solid rgba(255,255,255,0.15); border-radius: 24px; text-align: center; }
.balance-label { font-size: 12px; opacity: 0.8; }
.balance-apu { font-size: 40px; font-weight: 800; margin: 8px 0; color: #FFD600; }
.balance-usdt { font-size: 14px; opacity: 0.8; }
.daily-claim { margin: 0 16px 16px; padding: 14px; background: #00C853; border: none; border-radius: 14px; color: #fff; font-size: 16px; font-weight: 800; width: calc(100% - 32px); transition: all 0.2s; }
.daily-claim:disabled { background: #333; opacity: 0.6; }

.income-card { margin: 0 16px 16px; padding: 16px; background: linear-gradient(135deg, rgba(0,200,83,0.25) 0%, rgba(24,119,255,0.25) 100%); border: 1px solid rgba(0,200,83,0.4); border-radius: 16px; text-align: center; }
.income-label { font-size: 12px; opacity: 0.8; }
.income-value { font-size: 28px; font-weight: 800; color: #00FF88; margin: 4px 0; }

.miner-card { margin: 0 16px 12px; padding: 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; }
.miner-card.active { background: rgba(255,138,0,0.15); border: 1px solid rgba(255,138,0,0.4); }
.miner-card.starter { background: rgba(0,200,83,0.15); border: 1px solid rgba(0,200,83,0.4); }
.miner-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.miner-name { font-size: 16px; font-weight: 800; }
.miner-status { font-size: 11px; padding: 4px 8px; border-radius: 8px; background: #333; }
.miner-status.active { background: #00C853; }
.miner-info { font-size: 12px; opacity: 0.8; margin: 6px 0; }
.miner-roi { font-size: 11px; color: #00FF88; font-weight: 700; }
.miner-progress { font-size: 20px; font-weight: 800; color: #FFD600; text-align: center; margin: 8px 0; }

.progress-bar { width: 100%; height: 8px; background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; margin: 8px 0; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #00C853 0%, #00FF88 100%); border-radius: 10px; transition: width 0.3s; }
.progress-text { font-size: 11px; text-align: center; opacity: 0.8; }

.miner-btns { display: flex; gap: 8px; }
.miner-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 14px; font-weight: 800; }
.btn-buy { background: #FF8A00; color: #fff; width: 100%; }
.btn-ad { background: #1877FF; color: #fff; }
.btn-claim { background: #00C853; color: #fff; }
.miner-btn:disabled { background: #333; opacity: 0.6; }

.btn-row { display: flex; gap: 10px; padding: 0 16px 20px; }
.btn { flex: 1; padding: 14px; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; }
.btn-primary { background: #FF8A00; color: #fff; }
.btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
.page { display: none; padding: 0 16px; }
.page.active { display: block; }
.card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.card-header { display: flex; align-items: center; gap: 12px; }
.card-icon { width: 48px; height: 48px; border-radius: 12px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 22px; }
.card-info { flex: 1; }
.card-title { font-size: 15px; font-weight: 700; }
.card-sub { font-size: 12px; opacity: 0.7; }
.btn-get { padding: 10px 18px; background: #1877FF; border: none; border-radius: 10px; color: #fff; font-weight: 700; }
.btn-get.orange { background: #FF8A00; }
.btn-get:disabled { background: #333; opacity: 0.5; }
.bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(10,10,20,0.85); border-radius: 30px; padding: 8px; display: flex; gap: 8px; }
.nav-item { text-align: center; font-size: 10px; opacity: 0.6; background: none; border: none; color: #fff; padding: 4px 6px; }
.nav-item.active { opacity: 1; color: #FF8A00; }
.nav-icon { font-size: 20px; display: block; }

.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
.modal.active { display: flex; }
.modal-content { background: #0018B3; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.2); }
.modal-title { font-size: 20px; font-weight: 800; margin-bottom: 16px; text-align: center; }
.modal-info { font-size: 13px; opacity: 0.8; margin-bottom: 12px; text-align: center; }
.input-group { margin-bottom: 16px; }
.input-group label { font-size: 12px; opacity: 0.8; }
.input-group input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; font-size: 16px; margin-top: 4px; }
.modal-btns { display: flex; gap: 10px; }
.modal-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; }
.btn-confirm { background: #00C853; color: #fff; }
.btn-cancel { background: #333; color: #fff; }
</style>
</head>
<body>

  <div id="app">
    <div class="topbar"><h1>AdsPayU</h1></div>

    <div class="balance-card">
      <div class="balance-label">YOUR BALANCE</div>
      <div class="balance-apu" id="coins">0 APU</div>
      <div class="balance-usdt" id="usdt">0.0000 USDT</div>
    </div>

    <button class="daily-claim" id="dailyClaimBtn" onclick="claimDaily()">🎁 CLAIM DAILY 50 APU</button>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="withdraw()">WITHDRAW</button>
      <button class="btn btn-secondary" onclick="openSwap()">SWAP</button>
    </div>

    <div id="home" class="page active">
      <div class="card">
        <div class="card-header">
          <div class="card-icon">🎯</div>
          <div class="card-info">
            <div class="card-title">GigaPub Ads</div>
            <div class="card-sub"><span id="gigaCount">0</span>/100 today = 2 APU each</div>
          </div>
          <button class="btn-get" id="gigaBtn">Watch</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon">💰</div>
          <div class="card-info">
            <div class="card-title">Monetag Ads</div>
            <div class="card-sub"><span id="monetagCount">0</span>/100 today = 2 APU each</div>
          </div>
          <button class="btn-get orange" id="monetagBtn">Watch</button>
        </div>
      </div>
    </div>

    <div id="miner" class="page">
      <div class="income-card">
        <div class="income-label">TOTAL HOURLY INCOME</div>
        <div class="income-value" id="totalIncome">0 APU/h</div>
      </div>
      <div id="minerList"></div>
    </div>

    <div class="bottom-nav">
      <button class="nav-item active" onclick="showTab('home')"><span class="nav-icon">🏠</span>Home</button>
      <button class="nav-item" onclick="showTab('miner')"><span class="nav-icon">⚡</span>Miner</button>
      <button class="nav-item" onclick="showTab('rank')"><span class="nav-icon">🏆</span>Rank</button>
    </div>
  </div>

  <div class="modal" id="swapModal">
    <div class="modal-content">
      <div class="modal-title">SWAP APU → USDT</div>
      <div class="modal-info">Rate: 1 APU = $0.000025<br>Min Swap: 200 APU</div>
      <div class="input-group">
        <label>APU Amount</label>
        <input type="number" id="swapInput" placeholder="200" oninput="updateSwapPreview()">
      </div>
      <div class="modal-info" id="swapPreview">You will receive: 0.0000 USDT</div>
      <div class="modal-btns">
        <button class="modal-btn btn-cancel" onclick="closeSwap()">CANCEL</button>
        <button class="modal-btn btn-confirm" onclick="confirmSwap()">SWAP</button>
      </div>
    </div>
  </div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const COIN_VALUE = 0.000025;
const DAILY_LIMIT = 100;
const REWARD_PER_AD = 2;
const MIN_WITHDRAW = 100;
const MIN_SWAP = 200;
const MINER_INTERVAL = 60 * 60 * 1000;
const COOLDOWN_TIME = 5;

const MINERS = [
  {id: 0, name: "Starter Miner", cost: 0, reward: 28, icon: "🎁", roi: "Free", type: "starter", unlockAds: 200},
  {id: 1, name: "Miner Basic", cost: 1.00, reward: 139, icon: "⚡", roi: "150%"},
  {id: 2, name: "Miner Pro", cost: 3.00, reward: 417, icon: "⚡", roi: "150%"},
  {id: 3, name: "Miner Elite", cost: 8.00, reward: 1112, icon: "⚡", roi: "150%"},
  {id: 4, name: "Miner Master", cost: 15.00, reward: 2084, icon: "👑", roi: "150%"},
  {id: 5, name: "Miner God", cost: 35.00, reward: 4862, icon: "💎", roi: "150%"}
];

let coins = parseInt(localStorage.getItem('coins') || 0);
let usdt = parseFloat(localStorage.getItem('usdt') || 50);
let gigaWatched = parseInt(localStorage.getItem('gigaWatched') || 0);
let monetagWatched = parseInt(localStorage.getItem('monetagWatched') || 0);
let totalAdsWatched = parseInt(localStorage.getItem('totalAdsWatched') || 0);
let lastAdTime = parseInt(localStorage.getItem('lastAdTime') || 0);

let minerData = {};
MINERS.forEach(m => {
  minerData[m.id] = {
    owned: localStorage.getItem(`miner${m.id}_owned`) === 'true',
    lastClaim: parseInt(localStorage.getItem(`miner${m.id}_lastClaim`) || 0),
    adsWatched: parseInt(localStorage.getItem(`miner${m.id}_adsWatched`) || 0)
  }
});

updateUI();
checkDaily();
renderMiners();
updateTotalIncome();
setInterval(updateAllMiners, 1000);

function updateUI() {
  const usdtFromCoins = (coins * COIN_VALUE).toFixed(4);
  document.getElementById('coins').innerText = coins.toLocaleString() + ' APU';
  document.getElementById('usdt').innerText = usdtFromCoins + ' USDT | Wallet: ' + usdt.toFixed(2) + ' USDT';
  document.getElementById('gigaCount').innerText = gigaWatched;
  document.getElementById('monetagCount').innerText = monetagWatched;
  checkCooldown();
}

function checkCooldown() {
  const now = Date.now();
  const timeLeft = COOLDOWN_TIME * 1000 - (now - lastAdTime);
  const onCooldown = timeLeft > 0;

  document.getElementById('gigaBtn').disabled = onCooldown || gigaWatched >= DAILY_LIMIT;
  document.getElementById('monetagBtn').disabled = onCooldown || monetagWatched >= DAILY_LIMIT;

  if(onCooldown) {
    const secs = Math.ceil(timeLeft / 1000);
    document.getElementById('gigaBtn').innerText = `Wait ${secs}s`;
    document.getElementById('monetagBtn').innerText = `Wait ${secs}s`;
  } else {
    document.getElementById('gigaBtn').innerText = 'Watch';
    document.getElementById('monetagBtn').innerText = 'Watch';
  }
}

function updateTotalIncome() {
  let total = 0;
  MINERS.forEach(m => {
    if(minerData[m.id].owned) total += m.reward;
  });
  document.getElementById('totalIncome').innerText = total.toLocaleString() + ' APU/h';
}

function renderMiners() {
  const container = document.getElementById('minerList');
  container.innerHTML = '';
  MINERS.forEach(m => {
    const data = minerData[m.id];
    const now = Date.now();
    const isReady = data.owned && (now - data.lastClaim >= MINER_INTERVAL);
    const canClaim = isReady && data.adsWatched >= 2;
    const daysToROI = m.cost > 0? (m.cost / (m.reward * 24 * COIN_VALUE)).toFixed(1) : 'N/A';
    const onCooldown = (COOLDOWN_TIME * 1000 - (now - lastAdTime)) > 0;

    let buttons = '';
    let extraHTML = '';
    let cardClass = 'miner-card';

    if(m.type === 'starter') {
      cardClass += ' starter';
      const progress = Math.min(totalAdsWatched, m.unlockAds);
      const percent = (progress / m.unlockAds) * 100;
      extraHTML = `
        <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%"></div></div>
        <div class="progress-text">${progress}/${m.unlockAds} Ads Watched</div>
      `;
      if(!data.owned) {
        if(totalAdsWatched >= m.unlockAds) {
          buttons = `<button class="miner-btn btn-buy" onclick="unlockStarter()">UNLOCK FREE</button>`;
        } else {
          buttons = `<button class="miner-btn btn-buy" disabled>WATCH ${m.unlockAds - totalAdsWatched} MORE ADS</button>`;
        }
      }
    } else {
      if(!data.owned) {
        buttons = `<button class="miner-btn btn-buy" onclick="buyMiner(${m.id})">BUY - $${m.cost.toFixed(2)}</button>`;
      }
    }

    if(data.owned &&!isReady) {
      const timeLeft = MINER_INTERVAL - (now - data.lastClaim);
      const mins = Math.floor(timeLeft / 60000);
      const secs = Math.floor((timeLeft % 60000) / 1000);
      buttons = `<button class="miner-btn btn-buy" disabled>MINING... ${mins}m ${secs}s</button>`;
    }

    if(data.owned && isReady) {
      buttons = `
        <div class="miner-btns">
          <button class="miner-btn btn-ad" onclick="watchAdForMiner(${m.id})" ${data.adsWatched >= 2 || onCooldown? 'disabled' : ''}>
            ${onCooldown? 'WAIT 5s' : `WATCH AD ${data.adsWatched}/2`}
          </button>
          <button class="miner-btn btn-claim" onclick="claimMiner(${m.id})" ${!canClaim? 'disabled' : ''}>
            CLAIM ${m.reward}
          </button>
        </div>
      `;
    }

    const card = `
      <div class="${cardClass} ${data.owned? 'active' : ''}">
        <div class="miner-header">
          <div class="miner-name">${m.icon} ${m.name}</div>
          <div class="miner-status ${data.owned? 'active' : ''}">${data.owned? 'ACTIVE' : 'LOCKED'}</div>
        </div>
        <div class="miner-info">Cost: ${m.cost > 0? '$'+m.cost.toFixed(2) : '200 Total Ads'} | Earn: ${m.reward} APU/hour</div>
        <div class="miner-roi">ROI: ${m.roi} in 30 days ${daysToROI!== 'N/A'? '| Break-even: ~'+daysToROI+' days' : ''}</div>
        ${extraHTML}
        <div class="miner-progress">${isReady? m.reward + '/'+m.reward+' APU' : '0/'+m.reward+' APU'}</div>
        ${buttons}
      </div>
    `;
    container.innerHTML += card;
  });
}

function unlockStarter() {
  minerData[0].owned = true;
  minerData[0].lastClaim = Date.now();
  localStorage.setItem(`miner0_owned`, 'true');
  localStorage.setItem(`miner0_lastClaim`, minerData[0].lastClaim);
  renderMiners();
  updateTotalIncome();
  alert("🎁 Starter Miner Unlocked! Earn $0.50 in 30 days");
}

function buyMiner(id) {
  const m = MINERS.find(x => x.id === id);
  const data = minerData[id];
  if(usdt < m.cost) return alert(`Not enough USDT. Need $${m.cost.toFixed(2)}`);
  usdt -= m.cost;
  data.owned = true;
  data.lastClaim = Date.now();
  localStorage.setItem('usdt', usdt);
  localStorage.setItem(`miner${id}_owned`, 'true');
  localStorage.setItem(`miner${id}_lastClaim`, data.lastClaim);
  updateUI();
  renderMiners();
  updateTotalIncome();
  alert(`${m.name} Purchased for $${m.cost.toFixed(2)}!`);
}

function giveAdReward(callback) {
  lastAdTime = Date.now();
  localStorage.setItem('lastAdTime', lastAdTime);
  callback();
  updateUI();
  renderMiners();
}

function watchAdForMiner(id) {
  const now = Date.now();
  if((COOLDOWN_TIME * 1000 - (now - lastAdTime)) > 0) return alert("Wait 5 seconds before watching another ad");

  const data = minerData[id];
  if(data.adsWatched >= 2) return;
  if(typeof window.showGiga === 'function'){
    window.showGiga().then(function(){ // REWARD INSTANT AFTER AD
      giveAdReward(() => {
        data.adsWatched += 1;
        totalAdsWatched += 1;
        localStorage.setItem(`miner${id}_adsWatched`, data.adsWatched);
        localStorage.setItem('totalAdsWatched', totalAdsWatched);
        coins += REWARD_PER_AD;
        localStorage.setItem('coins', coins);
        alert(`Ad Completed! +${REWARD_PER_AD} APU. ${2 - data.adsWatched} left to claim miner`);
      });
    }).catch(function(e){ alert("No ads available"); });
  } else { alert("Ad SDK not loaded"); }
}

function claimMiner(id) {
  const m = MINERS.find(x => x.id === id);
  const data = minerData[id];
  const now = Date.now();
  if(now - data.lastClaim < MINER_INTERVAL) return alert("Not ready yet");
  if(data.adsWatched < 2) return alert("Watch 2 ads first to claim");
  coins += m.reward;
  data.lastClaim = now;
  data.adsWatched = 0;
  localStorage.setItem('coins', coins);
  localStorage.setItem(`miner${id}_lastClaim`, data.lastClaim);
  localStorage.setItem(`miner${id}_adsWatched`, 0);
  updateUI();
  renderMiners();
  updateTotalIncome();
  alert(`+${m.reward} APU Claimed from ${m.name}!`);
}

function updateAllMiners() {
  renderMiners();
  checkCooldown();
}

function openSwap() {
  document.getElementById('swapModal').classList.add('active');
  document.getElementById('swapInput').value = MIN_SWAP;
  updateSwapPreview();
}

function closeSwap() {
  document.getElementById('swapModal').classList.remove('active');
}

function updateSwapPreview() {
  const amount = parseInt(document.getElementById('swapInput').value) || 0;
  const usdtValue = (amount * COIN_VALUE).toFixed(4);
  document.getElementById('swapPreview').innerText = `You will receive: ${usdtValue} USDT`;
}

function confirmSwap() {
  const amount = parseInt(document.getElementById('swapInput').value) || 0;
  if(amount < MIN_SWAP) return alert(`Minimum swap is ${MIN_SWAP} APU`);
  if(amount > coins) return alert("Not enough APU balance");
  const usdtReceived = amount * COIN_VALUE;
  coins -= amount;
  usdt += usdtReceived;
  localStorage.setItem('coins', coins);
  localStorage.setItem('usdt', usdt);
  updateUI();
  closeSwap();
  alert(`Swapped ${amount} APU for ${usdtReceived.toFixed(4)} USDT!`);
}

function checkDaily() {
  const btn = document.getElementById('dailyClaimBtn');
  const today = new Date().toDateString();
  const lastDailyClaim = localStorage.getItem('lastDailyClaim');
  if(lastDailyClaim === today) {
    btn.disabled = true;
    btn.innerText = "✅ CLAIMED TODAY";
    btn.style.background = "#333";
  } else {
    btn.disabled = false;
    btn.innerText = "🎁 CLAIM DAILY 50 APU";
    btn.style.background = "#00C853";
  }
}

function claimDaily() {
  const today = new Date().toDateString();
  const lastDailyClaim = localStorage.getItem('lastDailyClaim');
  if(lastDailyClaim === today) return alert("You already claimed today!");
  coins += 50;
  localStorage.setItem('coins', coins);
  localStorage.setItem('lastDailyClaim', today);
  updateUI();
  checkDaily();
  alert("+50 APU Claimed!");
}

function trackTotalAds() {
  totalAdsWatched += 1;
  localStorage.setItem('totalAdsWatched', totalAdsWatched);
}

document.getElementById('gigaBtn').onclick = function(){
  const now = Date.now();
  if((COOLDOWN_TIME * 1000 - (now - lastAdTime)) > 0) return alert("Wait 5 seconds before watching another ad");
  if(gigaWatched >= DAILY_LIMIT) return alert("Giga limit reached");
  if(typeof window.showGiga === 'function'){
    window.showGiga().then(function(){ // REWARD INSTANT
      giveAdReward(() => {
        coins += REWARD_PER_AD; gigaWatched += 1;
        trackTotalAds();
        localStorage.setItem('coins', coins);
        localStorage.setItem('gigaWatched', gigaWatched);
        alert("+2 APU Earned!");
      });
    }).catch(function(e){ alert("No ads"); });
  } else { alert("Giga not loaded"); }
}

document.getElementById('monetagBtn').onclick = function(){
  const now = Date.now();
  if((COOLDOWN_TIME * 1000 - (now - lastAdTime)) > 0) return alert("Wait 5 seconds before watching another ad");
  if(monetagWatched >= DAILY_LIMIT) return alert("Monetag limit reached");
  if(typeof window.show_11258922 === 'function'){
    window.show_11258922().then(function(){ // REWARD INSTANT
      giveAdReward(() => {
        coins += REWARD_PER_AD; monetagWatched += 1;
        trackTotalAds();
        localStorage.setItem('coins', coins);
        localStorage.setItem('monetagWatched', monetagWatched);
        alert("+2 APU Earned!");
      });
    }).catch(function(e){ alert("No ads"); });
  } else { alert("Monetag not loaded"); }
}

function showTab(id){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.closest('.nav-item').classList.add('active');
}

function withdraw(){
  if(coins < MIN_WITHDRAW) {
    alert("Minimum withdraw is " + MIN_WITHDRAW + " APU");
    return;
  }
  alert("Withdraw request sent!");
}
</script>
</body>
</html>
