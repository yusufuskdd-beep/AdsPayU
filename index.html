<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>MinerAds</title>
  <link rel="stylesheet" href="style.css" />

<body>

  <script src="script.js"></script>
