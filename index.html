<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://gigapub.tech/sdk.js"></script> <!-- NEW LINK -->
<title>AdsPayU</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(180deg, #0A2AFF 0%, #0018B3 50%, #000A4D 100%); color: #fff; padding-bottom: 90px; min-height: 100vh; }
  #loader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0A2AFF; z-index: 9999; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; }
  #loader.hide { opacity: 0; pointer-events: none; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
  .topbar h1 { font-size: 18px; font-weight: 700; }
  .balance-section { padding: 0 16px 16px; }
  .balance { font-size: 42px; font-weight: 800; }
  .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; background: linear-gradient(90deg, #FF8A00 0%, #FF6A00 100%); color: #fff; }
  .btn-get { padding: 10px 18px; background: linear-gradient(90deg, #1877FF 0%, #0A5FFF 100%); border: none; border-radius: 10px; color: #fff; font-weight: 700; }
  .btn-get:disabled { background: #333; opacity: 0.5; }
  .card { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 14px; margin: 16px; }
</style>
</head>
<body>
  <div id="loader">Loading GigaPub...</div>
  <div id="app" style="display:none">
    <div class="topbar"><h1>AdsPayU</h1></div>
    <div class="balance-section">
      <div>BALANCE</div>
      <div class="balance"><span id="coins">0</span> APU</div>
    </div>
    <div class="card">
      <h3>Watch Ad +50 APU</h3>
      <button class="btn-get" id="watchBtn" disabled>Loading...</button>
    </div>
  </div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
const GIGA_TOKEN = "main";
let coins = parseInt(localStorage.getItem('coins') || 0);
let adWatched = parseInt(localStorage.getItem('adWatched') || 0);

document.getElementById('coins').innerText = coins;

// WAIT FOR GIGAPUB
let tries = 0;
const check = setInterval(() => {
  tries++;
  if(typeof window.showGiga === 'function') {
    clearInterval(check);
    document.getElementById('loader').classList.add('hide');
    document.getElementById('app').style.display = 'block';
    document.getElementById('watchBtn').disabled = false;
    document.getElementById('watchBtn').innerText = "Get APU";
    document.getElementById('watchBtn').onclick = showGigaAd;
  }
  if(tries > 40) { // 8 seconds
    clearInterval(check);
    document.getElementById('loader').innerText = "Failed to load. Tap to retry";
    document.getElementById('loader').onclick = () => location.reload();
  }
}, 200);

function showGigaAd() {
  if(adWatched >= 50) return tg.showAlert("Daily limit");
  window.showGiga(GIGA_TOKEN)
  .then(() => { 
    coins += 50;
    adWatched += 1;
    localStorage.setItem('coins', coins);
    localStorage.setItem('adWatched', adWatched);
    document.getElementById('coins').innerText = coins;
    tg.showPopup({title: "Success!", message: "+50 APU"});
  })
  .catch(e => tg.showAlert("Error: " + e));
}
</script>
</body>
</html>
