<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdsPayU</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  body { font-family: Arial; background: #0e0e0e; color: white; text-align: center; padding: 20px; margin: 0; }
  #balance { font-size: 36px; color: #00ff88; margin: 20px 0; font-weight: bold; }
  button { padding: 18px 40px; font-size: 18px; background: #00ff88; color: black; border: none; border-radius: 12px; cursor: pointer; margin: 10px; font-weight: bold; }
  button:disabled { background: #555; cursor: not-allowed; color: #aaa; }
  #status { margin-top: 15px; font-size: 14px; color: #aaa; min-height: 20px; }
  .card { background: #1a1a1a; padding: 20px; border-radius: 15px; margin: 20px auto; max-width: 400px; }
  #timer { color: #00ff88; font-weight: bold; }
</style>
</head>
<body>

<h1>AdsPayU 💰</h1>
<div class="card">
  <div>Your Balance</div>
  <div id="balance">$0.0000</div>
</div>

<button id="watchAdBtn">Watch Ad +$0.0006</button>
<div id="status">Loading SDK...</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); 
tg.expand();

const user_id = tg.initDataUnsafe?.user?.id || "guest123";
const API = "https://adspayu-backend-5y7g.onrender.com";

let canWatch = true;
let cooldown = 5; 

// LOAD GIGAPUB DYNAMICALLY AFTER TG READY
function loadGiga() {
    const script = document.createElement('script');
    script.src = 'https://ad.gigapub.tech/script?id=7204';
    script.async = true;
    script.onload = () => {
        document.getElementById('status').innerText = "Ready to earn";
        console.log("GigaPub Loaded");
    };
    script.onerror = () => {
        document.getElementById('status').innerText = "❌ GigaPub Blocked by Telegram";
    };
    document.head.appendChild(script);
}

async function loadBalance() {
    try {
        const res = await fetch(`${API}/api/balance?user_id=${user_id}`);
        const data = await res.json();
        document.getElementById('balance').innerText = `$${data.balance.toFixed(4)}`;
    } catch(e) {
        document.getElementById('status').innerText = "Backend offline.";
    }
}

async function creditUser() {
    const res = await fetch(`${API}/api/credit?user_id=${user_id}&amount=0.0006`);
    const data = await res.json();
    document.getElementById('balance').innerText = `$${data.new_balance.toFixed(4)}`;
    document.getElementById('status').innerText = "Credited +$0.0006 ✅";
}

function startCooldown() {
    let timeLeft = cooldown;
    const btn = document.getElementById('watchAdBtn');
    const status = document.getElementById('status');
    
    const timer = setInterval(() => {
        status.innerHTML = `Wait <span id="timer">${timeLeft}s</span> for next ad`;
        timeLeft--;
        if (timeLeft < 0) {
            clearInterval(timer);
            canWatch = true;
            btn.disabled = false;
            btn.innerText = "Watch Ad +$0.0006";
            status.innerText = "Ready for next ad";
        }
    }, 1000);
}

function watchAd() {
    if (!canWatch) return;
    if (typeof window.showGiga !== 'function') {
        alert("Ad SDK not loaded. Try reopening the app.");
        return;
    }
    
    const btn = document.getElementById('watchAdBtn');
    canWatch = false;
    btn.disabled = true;
    btn.innerText = "Watching...";
    document.getElementById('status').innerText = "Loading ad...";

    window.showGiga({
        onReward: async () => {
            await creditUser();
            startCooldown();
        },
        onError: (err) => {
            console.log("GigaPub Error:", err);
            document.getElementById('status').innerText = "No ad available. Try again.";
            startCooldown();
        }
    });
}

document.getElementById('watchAdBtn').onclick = watchAd;
loadBalance();
loadGiga(); // Load SDK after page loads
</script>
</body>
</html>
