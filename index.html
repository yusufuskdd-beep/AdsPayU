<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://ad.gigapub.tech/script?id=7204"></script>
<script src='//libtl.com/sdk.js' data-zone='11258922' data-sdk='show_11258922'></script>
<title>AdsPayU</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0A2AFF; color: #fff; padding-bottom: 90px; min-height: 100vh; }
  #loader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0A2AFF; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.6s ease; }
  #loader.hide { opacity: 0; pointer-events: none; }
  #splashImg { width: 100%; height: 100vh; object-fit: cover; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; position: sticky; top: 0; background: rgba(0,10,77,0.8); backdrop-filter: blur(20px); z-index: 10; }
  .topbar h1 { font-size: 18px; font-weight: 700; }
  .balance-section { padding: 16px; text-align: center; }
  .balance-label { font-size: 12px; opacity: 0.7; letter-spacing: 1px; }
  .balance { font-size: 48px; font-weight: 800; margin: 8px 0; }
  .balance span { font-size: 20px; opacity: 0.8; }
  .usd { font-size: 14px; opacity: 0.7; }
  .btn-row { display: flex; gap: 10px; padding: 0 16px 20px; }
  .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .btn-primary { background: linear-gradient(90deg, #FF8A00 0%, #FF6A00 100%); color: #fff; }
  .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
  .page { display: none; padding: 0 16px; }
  .page.active { display: block; }
  .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
  .card-header { display: flex; align-items: center; gap: 12px; }
  .card-icon { width: 48px; height: 48px; border-radius: 12px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .card-info { flex: 1; }
  .card-title { font-size: 15px; font-weight: 700; }
  .card-sub { font-size: 12px; opacity: 0.7; margin-top: 2px; }
  .btn-get { padding: 10px 18px; background: linear-gradient(90deg, #1877FF 0%, #0A5FFF 100%); border: none; border-radius: 10px; color: #fff; font-weight: 700; }
  .btn-get.orange { background: linear-gradient(90deg, #FF8A00 0%, #FF6A00 100%); }
  .btn-get:disabled { background: #333; opacity: 0.5; }
  .list-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 14px; }
  .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(10,10,20,0.85); backdrop-filter: blur(20px); border-radius: 30px; padding: 8px; display: flex; gap: 16px; }
  .nav-item { text-align: center; font-size: 10px; opacity: 0.6; background: none; border: none; color: #fff; padding: 4px 8px; }
  .nav-item.active { opacity: 1; color: #FF8A00; }
  .nav-icon { font-size: 22px; display: block; }
  .nav-center { background: linear-gradient(135deg, #FF3B30 0%, #FF6A00 100%); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; }
</style>
</head>
<body>

  <div id="loader">
    <!-- LOCAL FILE -->
    <img id="splashImg" src="splash.jpg" alt="AdsPayU" onerror="this.style.display='none'">
  </div>

  <div id="app" style="display:none">
    <div class="topbar"><h1>AdsPayU</h1></div>
    <div class="balance-section">
      <div class="balance-label">BALANCE</div>
      <div class="balance"><span id="coins">0</span> <span>APU</span></div>
      <div class="usd">🪙 ~$<span id="usd">0.00</span></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="withdraw()">WITHDRAW</button>
      <button class="btn btn-secondary" onclick="swap()">SWAP</button>
    </div>
    <div id="home" class="page active">
      <div class="card">
        <div class="card-header">
          <div class="card-icon">🎯</div>
          <div class="card-info">
            <div class="card-title">GigaPub Ads</div>
            <div class="card-sub">Watch 2 Ads | Earn 50 APU | <span id="adLimit">0</span>/100 today</div>
          </div>
          <button class="btn-get" id="gigaBtn" disabled>Loading...</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-icon">💰</div>
          <div class="card-info">
            <div class="card-title">Monetag Ads</div>
            <div class="card-sub">Watch 1 Ad | Earn 50 APU</div>
          </div>
          <button class="btn-get orange" id="monetagBtn" disabled>Loading...</button>
        </div>
      </div>
    </div>
    <div id="rank" class="page"><div class="card"><h3>🏆 Top Earners</h3><div id="board"></div></div></div>
    <div class="bottom-nav">
      <button class="nav-item active" onclick="showTab('home')"><span class="nav-icon">🏠</span>Home</button>
      <button class="nav-item" onclick="showTab('friends')"><span class="nav-icon">👥</span>Friends</button>
      <button class="nav-item" onclick="showTab('mission')"><span class="nav-icon">📋</span>Mission</button>
      <button class="nav-item" onclick="showTab('rank')"><span class="nav-icon">🏆</span>Rank</button>
      <button class="nav-item" onclick="showTab('add')"><span class="nav-center">+</span></button>
    </div>
  </div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.setBackgroundColor('#0A2AFF');
const COIN_VALUE = 0.000028;
const DAILY_LIMIT = 100;
let coins = parseInt(localStorage.getItem('coins') || 0);
let adWatched = parseInt(localStorage.getItem('adWatched') || 0);
const user = tg.initDataUnsafe?.user;
const userId = user?.id || "guest";
const userName = user?.first_name + (user?.last_name? " + user.last_name : "") || "Guest";

// OPEN AFTER 1.5S
setTimeout(() => {
  document.getElementById('loader').classList.add('hide');
  document.getElementById('app').style.display = 'block';
  enableAds(); updateUI(); savePlayer(); loadLeaderboard();
}, 1500);

function enableAds() {
  document.getElementById('gigaBtn').disabled = false;
  document.getElementById('monetagBtn').disabled = false;
  document.getElementById('gigaBtn').innerText = "Watch";
  document.getElementById('monetagBtn').innerText = "Watch";
  document.getElementById('gigaBtn').onclick = startGigaQueue;
  document.getElementById('monetagBtn').onclick = showMonetagAd;
}
function updateUI() {
  document.getElementById('coins').innerText = coins;
  document.getElementById('usd').innerText = (coins * COIN_VALUE).toFixed(2);
  document.getElementById('adLimit').innerText = adWatched;
  if(adWatched >= DAILY_LIMIT) {
    document.getElementById('gigaBtn').disabled = true;
    document.getElementById('gigaBtn').innerText = "Daily Limit";
  }
}
let gigaQueue = 0; let gigaCompleted = false;
function startGigaQueue() { if(adWatched >= DAILY_LIMIT - 1) return tg.showAlert("Not enough ads left today"); gigaQueue = 2; gigaCompleted = false; playGigaAd(); }
function playGigaAd() { if(gigaQueue <= 0) return finishGigaAd(); document.getElementById('gigaBtn').innerText = "Loading..."; window.showGiga().then(() => { gigaQueue -= 1; if(gigaQueue > 0) setTimeout(playGigaAd, 3000); else { gigaCompleted = true; finishGigaAd(); } }).catch(e => { gigaQueue = 0; gigaCompleted = false; document.getElementById('gigaBtn').innerText = "Watch"; if(e === 'No ads') tg.showAlert("GigaPub: No ads available."); else if(e === 'Skipped') tg.showAlert("Ad skipped. No reward."); }); }
function finishGigaAd() { if(gigaCompleted) { coins += 50; adWatched += 2; localStorage.setItem('coins', coins); localStorage.setItem('adWatched', adWatched); updateUI(); savePlayer(); loadLeaderboard(); tg.showPopup({title: "GigaPub Complete!", message: "+50 APU"}); } document.getElementById('gigaBtn').innerText = "Watch"; }
function showMonetagAd() { document.getElementById('monetagBtn').innerText = "Loading..."; window.show_11258922().then(() => { coins += 50; localStorage.setItem('coins', coins); updateUI(); savePlayer(); loadLeaderboard(); tg.showPopup({title: "Monetag Complete!", message: "+50 APU"}); }).catch(e => { tg.showAlert("Monetag: " + e); }).finally(() => { document.getElementById('monetagBtn').innerText = "Watch"; }); }
function savePlayer() { let leaderboard = JSON.parse(localStorage.getItem('leaderboard') || '[]'); leaderboard = leaderboard.filter(p => p.id !== userId); leaderboard.push({ id: userId, name: userName, coins: coins }); leaderboard.sort((a,b) => b.coins - a.coins); leaderboard = leaderboard.slice(0, 20); localStorage.setItem('leaderboard', JSON.stringify(leaderboard)); }
function loadLeaderboard() { let leaderboard = JSON.parse(localStorage.getItem('leaderboard') || '[]'); if(leaderboard.length === 0) { document.getElementById('board').innerHTML = '<p style="opacity:0.6">No players yet</p>'; return; } let html = ''; leaderboard.forEach((player, index) => { const isMe = player.id === userId; html += `<div class="list-item"><span>#${index + 1} ${player.name} ${isMe? '(You)' : ''}</span><span>${player.coins} APU</span></div>`; }); document.getElementById('board').innerHTML = html; }
function showTab(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); event.currentTarget.classList.add('active'); if(id === 'rank') loadLeaderboard(); }
function withdraw() { tg.showPopup({title: "Withdraw", message: `You have ${coins} APU\nMin withdraw: 10000 APU`, buttons: [{type: "close"}]}); }
function swap() { tg.showAlert("Swap feature coming soon"); }
if(!localStorage.getItem('lastReset') || new Date().toDateString() !== localStorage.getItem('lastReset')) { localStorage.setItem('adWatched', 0); localStorage.setItem('lastReset', new Date().toDateString()); }
</script>
</body>
</html>
