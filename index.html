<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AdsPayU v7.12.23</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script type='text/javascript' src='//pl00000.adsterra.com/00/00/invoke.js'></script> <!-- REPLACE WITH YOUR ADSTERRA -->
</head>
<body>
<div id="toast" class="toast">Toast</div>

<div id="app">
<div class="topbar"><h1>AdsPayU</h1><div id="streak">🔥 Day <span id="day">1</span></div></div>

<!-- HOME -->
<div id="home" class="page active">
<div class="balance-card"><b>BALANCE:</b> <span id="coins">818</span> APU</div>
<button class="btn btn-primary" id="dailyBtn">🎁 CLAIM DAILY 50 APU</button>
<div id="adBanner"></div>
<button class="btn btn-secondary" id="rewardedBtn">📺 WATCH AD +20 APU</button>
</div>

<!-- EARN -->
<div id="earn" class="page">
<div class="balance-card"><b>EARN MORE</b></div>
<div class="task" id="task1">📢 Join Telegram <button class="btn-small">+25</button></div>
<div class="task" id="task2">🐦 Follow X <button class="btn-small">+25</button></div>
<div class="task" id="task3">🌐 Visit Website <button class="btn-small">+25</button></div>
<button class="btn btn-secondary" id="referBtn">👥 INVITE FRIEND +100 APU</button>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
<div class="balance-card"><b>BALANCE:</b> <span id="coins2">818</span> APU<br><span id="usdt">0.11</span> USDT<br><small>1 APU = $0.00025</small></div>
<button class="btn btn-primary" id="connectBtn">🔗 CONNECT TON</button>
<button class="btn btn-success" id="depositBtn">💎 DEPOSIT 1 TON → 4000 APU</button>
<button class="btn btn-secondary" id="swapBtn">SWAP 400 APU → $0.10</button>
<button class="btn btn-danger" id="withdrawBtn">WITHDRAW USDT</button>
<div class="history"><b>HISTORY:</b><div id="historyList"></div></div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
<div class="balance-card"><b>PROFILE</b><br>@<span id="username">user</span><br>Referrals: <span id="refCount">0</span></div>
<button class="btn btn-secondary" id="refLinkBtn">📋 COPY REFERRAL LINK</button>
<button class="btn btn-danger" id="logoutBtn">LOGOUT</button>
</div>

<div class="bottom-nav">
<button class="nav-item active" id="homeNav">🏠 Home</button>
<button class="nav-item" id="earnNav">💎 Earn</button>
<button class="nav-item" id="walletNav">💰 Wallet</button>
<button class="nav-item" id="profileNav">👤 Profile</button>
</div>
</div>

<script>
let coins = parseFloat(localStorage.getItem('coins')) || 818;
let usdt = parseFloat(localStorage.getItem('usdt')) || 0.11;
let history = JSON.parse(localStorage.getItem('history')) || [];
let tonConnectUI;
let walletConnected = localStorage.getItem('walletConnected') === 'true';
let walletAddress = localStorage.getItem('walletAddress') || null;
const COIN_VALUE = 0.00025;
const BOT_TOKEN = "8885882723:AAGM69BIEIUJleXR66SO76fk4LOU3LRSZ08";
const CHAT_ID = "8954036308";
const ADMIN_WALLET = "UQAAAAAAAAAAAAAAAAAAAAAAAAAAAM9c"; // CHANGE THIS
const REF_BONUS = 100;

function showToast(msg){const t=document.getElementById('toast');t.innerText=msg;t.className='toast show';setTimeout(()=>t.className='toast',3000)}
function showTab(tab){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.getElementById(tab).classList.add('active');document.getElementById(tab+'Nav').classList.add('active');updateUI()}
function addHistory(type, amount){history.unshift({type,amount,time:new Date().toLocaleString()});if(history.length>10)history.pop();localStorage.setItem('history',JSON.stringify(history))}
function renderHistory(){document.getElementById('historyList').innerHTML=history.map(h=>`<div>${h.type}: ${h.amount}</div>`).join('')}

function updateUI(){
    document.getElementById('coins').innerText=coins;
    document.getElementById('coins2').innerText=coins;
    document.getElementById('usdt').innerText=usdt.toFixed(2);
    document.getElementById('username').innerText=Telegram.WebApp.initDataUnsafe.user?.username || 'user';
    document.getElementById('refCount').innerText=localStorage.getItem('refCount') || 0;
    renderHistory();
    checkStreak();
}

function checkStreak(){
    let last = localStorage.getItem('lastStreak');
    let today = new Date().toDateString();
    let day = parseInt(localStorage.getItem('streakDay')) || 1;
    if(last !== today){ localStorage.setItem('streakDay', day+1); localStorage.setItem('lastStreak', today) }
    document.getElementById('day').innerText = localStorage.getItem('streakDay') || 1;
}

function initTon(){
try{
tonConnectUI = new TON_CONNECT_UI.TonConnectUI({manifestUrl: 'https://adspayu.vercel.app/tonconnect-manifest.json', buttonRootId: 'connectBtn'});
tonConnectUI.onStatusChange(wallet => {
    if(wallet?.account){walletConnected = true; walletAddress = wallet.account.address;localStorage.setItem('walletConnected','true');localStorage.setItem('walletAddress',walletAddress);showToast("TON Connected!");}
    else {walletConnected = false; walletAddress = null;localStorage.setItem('walletConnected','false');localStorage.setItem('walletAddress','');showToast("TON Disconnected");}
    updateConnectBtn();
});
if(walletConnected){ tonConnectUI.restoreConnection(); }
}catch(e){ showToast("Ton Error") }
}

function updateConnectBtn(){
    const btn = document.getElementById('connectBtn');
    if(walletConnected && walletAddress){ btn.innerText = `✅ ${walletAddress.slice(0,4)}...${walletAddress.slice(-4)}`; btn.onclick = () => tonConnectUI.disconnect();}
    else { btn.innerText = "🔗 CONNECT TON"; btn.onclick = () => tonConnectUI.openModal();}
}

// NAV
document.getElementById('homeNav').onclick=()=>showTab('home');
document.getElementById('earnNav').onclick=()=>showTab('earn');
document.getElementById('walletNav').onclick=()=>showTab('wallet');
document.getElementById('profileNav').onclick=()=>showTab('profile');

// HOME
document.getElementById('dailyBtn').onclick=()=>{
    let last = localStorage.getItem('lastDaily'); let today = new Date().toDateString();
    if(last === today){ showToast("Come back tomorrow"); return }
    coins+=50;localStorage.setItem('coins',coins);localStorage.setItem('lastDaily',today);addHistory('Daily','+50 APU');updateUI();showToast("+50 APU")
};
document.getElementById('rewardedBtn').onclick=()=>{coins+=20;localStorage.setItem('coins',coins);addHistory('Ad','+20 APU');updateUI();showToast("+20 APU Ad Watched")};

// EARN TASKS
['task1','task2','task3'].forEach(id=>{
    document.getElementById(id).onclick=()=>{
        if(localStorage.getItem(id)){ showToast("Already done"); return }
        coins+=25;localStorage.setItem('coins',coins);localStorage.setItem(id,'done');addHistory('Task','+25 APU');updateUI();showToast("+25 APU")
    }
});
document.getElementById('referBtn').onclick=()=>{coins+=REF_BONUS;let rc=parseInt(localStorage.getItem('refCount'))||0;localStorage.setItem('refCount',rc+1);localStorage.setItem('coins',coins);addHistory('Referral',`+${REF_BONUS} APU`);updateUI();showToast(`+${REF_BONUS} APU Referral`)};

// WALLET
document.getElementById('depositBtn').onclick=async()=>{
    if(!walletConnected){ showToast("Connect TON first"); return }
    let amountTON = 1; let apuToAdd = amountTON / COIN_VALUE;
    const transaction = {validUntil: Math.floor(Date.now() / 1000) + 360,messages: [{address: ADMIN_WALLET,amount: (amountTON * 1000000000).toString()}]}
    try{await tonConnectUI.sendTransaction(transaction);coins += apuToAdd;localStorage.setItem('coins',coins);addHistory('Deposit',`+${apuToAdd} APU`);updateUI();showToast(`+${apuToAdd} APU Deposited!`);
        let msg = `💎 NEW DEPOSIT\nUser: @${Telegram.WebApp.initDataUnsafe.user?.username}\nWallet: ${walletAddress}\nAmount: ${amountTON} TON`;fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CHAT_ID, text:msg})});
    }catch(e){ showToast("Transaction cancelled") }
}
document.getElementById('swapBtn').onclick=()=>{if(coins>=400){coins-=400;usdt+=400*COIN_VALUE;localStorage.setItem('coins',coins);localStorage.setItem('usdt',usdt);addHistory('Swap','-400 APU');updateUI();showToast("Swapped 400 APU → $0.10")}else{ showToast("Min 400 APU") }};
document.getElementById('withdrawBtn').onclick=()=>{if(!walletConnected){ showToast("Connect TON first"); return }if(usdt>=0.50){ let username = Telegram.WebApp.initDataUnsafe.user?.username || 'no_username';let userId = Telegram.WebApp.initDataUnsafe.user?.id || 'no_id';let msg = `🔔 NEW WITHDRAW REQUEST 🔔\n\nUser: @${username}\nUser ID: ${userId}\nWallet: ${walletAddress}\nAmount: 0.50 USDT\nAPU Balance: ${coins}`;fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CHAT_ID, text:msg})}).then(()=>showToast("Withdraw Request Sent! 24h")).catch(()=>showToast("Send Failed"));usdt-=0.50; localStorage.setItem('usdt',usdt); addHistory('Withdraw','-0.50 USDT'); updateUI();} else { showToast("Min 0.50 USDT") }};

// PROFILE
document.getElementById('refLinkBtn').onclick=()=>{let userId = Telegram.WebApp.initDataUnsafe.user?.id || 'guest';let link = `https://t.me/YOUR_BOT_USERNAME?start=ref${userId}`;navigator.clipboard.writeText(link); showToast("Referral Link Copied!")}
document.getElementById('logoutBtn').onclick=()=>{localStorage.clear();location.reload()}

if(window.Telegram?.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();}
initTon(); updateUI();
</script>
</body>
</html>
