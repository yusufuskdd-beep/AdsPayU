<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #111);
    --card: var(--tg-theme-secondary-bg-color, #1f1f1f);
    --text: var(--tg-theme-text-color, #fff);
    --accent: var(--tg-theme-button-color, #2481cc);
    --accent-text: var(--tg-theme-button-text-color, #fff);
  }
    * { box-sizing: border-box; }
  body { 
    margin: 0; 
    background: var(--bg); 
    color: var(--text); 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding-bottom: 80px;
  }
  
  .header {
    padding: 20px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .coins {
    background: var(--card);
    padding: 8px 14px;
    border-radius: 20px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .container { padding: 0 16px; }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 14px;
  }
  .card h3 { margin: 0 0 8px; font-size: 18px; }
  .card p { margin: 0; opacity: 0.8; font-size: 14px; }

  .btn-primary {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: var(--accent);
    color: var(--accent-text);
    font-size: 17px;
    font-weight: 600;
    margin-top: 12px;
  }

  .page { display: none; }
  .page.active { display: block; animation: fade .2s ease; }
  @keyframes fade { from {opacity:0; transform: translateY(4px)} to {opacity:1; transform: translateY(0)} }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    display: flex;
    justify-content: space-around;
    padding: 10px 0 env(safe-area-inset-bottom);
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .nav-item {
    flex: 1;
    text-align: center;
    font-size: 12px;
    opacity: 0.6;
    border: none;
    background: none;
    color: var(--text);
  }
  .nav-item.active { opacity: 1; color: var(--accent); font-weight: 600; }
  .nav-icon { font-size: 22px; display: block; margin-bottom: 2px; }

  .list-item {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
</style>
</head>
<body>
  <div class="header">
    <h2>Rewards</h2>
    <div class="coins">🪙 <span id="coins">0</span></div>
  </div>

  <div class="container">
    <!-- HOME -->
    <div id="home" class="page active">
      <div class="card">
        <h3>Watch & Earn</h3>
        <p>Watch a short ad and get coins instantly</p>
        <button class="btn-primary" onclick="watchAd()">▶ Watch Ad +10</button>
      </div>
      <div class="card">
        <h3>Daily Bonus</h3>
        <p>Come back tomorrow for free coins</p>
        <button class="btn-primary" style="background:#2ea043" onclick="claimDaily()">Claim</button>
      </div>
    </div>

    <!-- REFERRAL -->
    <div id="referral" class="page">
      <div class="card">
        <h3>Invite Friends</h3>
        <p>Get 50 coins for each friend who joins</p>
        <button class="btn-primary" onclick="copyLink()">Copy Referral Link</button>
      </div>
      <div class="card">
        <h3>Your Stats</h3>
        <p>Friends invited: <b id="refCount">0</b></p>
      </div>
    </div>

    <!-- LEADERBOARD -->
    <div id="leaderboard" class="page">
      <div class="card">
        <h3>Top Earners</h3>
        <div id="board"></div>
      </div>
    </div>
  </div>

  <!-- Bottom Tab Bar -->
  <div class="bottom-nav">
    <button class="nav-item active" onclick="showTab('home')">
      <span class="nav-icon">🏠</span>Home
    </button>
    <button class="nav-item" onclick="showTab('referral')">
      <span class="nav-icon">👥</span>Referral
    </button>
    <button class="nav-item" onclick="showTab('leaderboard')">
      <span class="nav-icon">🏆</span>Leaderboard
    </button>
  </div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.setHeaderColor('secondary_bg_color');

let coins = parseInt(localStorage.getItem('coins') || 0);
let referrals = parseInt(localStorage.getItem('referrals') || 0);
document.getElementById('coins').innerText = coins;
document.getElementById('refCount').innerText = referrals;

function showTab(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.currentTarget.classList.add('active');
  if(id === 'leaderboard') loadLeaderboard();
}

function watchAd() {
  // plug your ad SDK here
  tg.HapticFeedback.impactOccurred('light');
  coins += 10;
  localStorage.setItem('coins', coins);
  document.getElementById('coins').innerText = coins;
  tg.showPopup({title: "Earned!", message: "+10 coins"});
}

function claimDaily() {
  tg.showAlert("Daily bonus claimed!");
}

function copyLink() {
  const userId = tg.initDataUnsafe?.user?.id || "demo";
  const link = `https://t.me/YourBotName?startapp=ref_${userId}`;
  navigator.clipboard.writeText(link);
  tg.showAlert("Link copied to clipboard");
}

function loadLeaderboard() {
  const demo = [
    {name: "Alex", coins: 1240},
    {name: tg.initDataUnsafe?.user?.first_name || "You", coins: coins},
    {name: "Sam", coins: 800}
  ].sort((a,b) => b.coins - a.coins);
  
  document.getElementById('board').innerHTML = demo.map((u,i) => 
    `<div class="list-item"><span>${i+1}. ${u.name}</span><b>${u.coins}</b></div>`
  ).join('');
}
</script>
</body>
</html>
