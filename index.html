<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdsPayU</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src='//lib.gigapub.tech/gigapub.js'></script>
<style>
  body { font-family: Arial; background: #0e0e0e; color: white; text-align: center; padding: 20px; }
  #balance { font-size: 32px; color: #00ff88; margin: 20px 0; }
  button { padding: 15px 30px; font-size: 18px; background: #00ff88; color: black; border: none; border-radius: 10px; cursor: pointer; margin: 10px; }
  button:disabled { background: #555; cursor: not-allowed; }
</style>
</head>
<body>

<h1>AdsPayU 💰</h1>
<div>Your Balance</div>
<div id="balance">$0.0000</div>

<button id="watchAdBtn">Watch Ad +$0.0006</button>
<div id="status"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
const user_id = tg.initDataUnsafe?.user?.id || "guest123";

// 1. YOUR BACKEND URL
const API = "https://adspayu-backend-5y7g.onrender.com";

// 2. LOAD BALANCE ON START
async function loadBalance() {
    try {
        const res = await fetch(`${API}/api/balance?user_id=${user_id}`);
        const data = await res.json();
        document.getElementById('balance').innerText = `$${data.balance.toFixed(4)}`;
    } catch(e) {
        document.getElementById('status').innerText = "Backend offline. Check Render.";
    }
}

// 3. SHOW AD AND CREDIT
document.getElementById('watchAdBtn').onclick = () => {
    const btn = document.getElementById('watchAdBtn');
    btn.disabled = true;
    document.getElementById('status').innerText = "Loading ad...";
    
    showGigaAd(); // This calls GigaPub
};

// 4. GIGAPUB CALLBACK - FIRES WHEN AD IS WATCHED
window.showGigaAd = () => {
    window.GigaPub.showAd({
        userId: user_id,
        onReward: async () => {
            document.getElementById('status').innerText = "Crediting...";
            // Call backend to add money
            const res = await fetch(`${API}/api/credit?user_id=${user_id}&amount=0.0006`);
            const data = await res.json();
            document.getElementById('balance').innerText = `$${data.new_balance.toFixed(4)}`;
            document.getElementById('status').innerText = "Credited +$0.0006 ✅";
            document.getElementById('watchAdBtn').disabled = false;
        },
        onError: () => {
            document.getElementById('status').innerText = "Ad failed. Try again.";
            document.getElementById('watchAdBtn').disabled = false;
        }
    });
};

loadBalance();
</script>

</body>
</html>
