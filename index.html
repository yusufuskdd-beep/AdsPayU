<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="toast" class="toast">Toast</div>

<div id="app">
<div class="topbar"><h1>TEST APP</h1></div>

<div id="home" class="page active">
<button class="btn btn-primary" id="test1">BUTTON 1: HOME</button>
</div>

<div id="wallet" class="page">
<button class="btn btn-primary" id="test2">BUTTON 2: WALLET</button>
</div>

<div class="bottom-nav">
<button class="nav-item active" id="homeNav">🏠 Home</button>
<button class="nav-item" id="walletNav">💰 Wallet</button>
</div>
</div>

<script>
function showToast(msg){const t=document.getElementById('toast');t.innerText=msg;t.className='toast show';setTimeout(()=>t.className='toast',2000)}
function showTab(tab){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.getElementById(tab).classList.add('active');document.getElementById(tab+'Nav').classList.add('active')}

document.getElementById('test1').onclick=()=>showToast("Button 1 Works");
document.getElementById('test2').onclick=()=>showToast("Button 2 Works");
document.getElementById('homeNav').onclick=()=>showTab('home');
document.getElementById('walletNav').onclick=()=>showTab('wallet');
</script>
</body>
</html>
