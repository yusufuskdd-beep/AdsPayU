<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AdsPayU TEST</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0a0e27;color:#fff}
.page{display:none;padding:20px}.page.active{display:block}
.balance-card{background:#1a1f3a;padding:30px;border-radius:20px;text-align:center;margin:20px}
.balance-apu{font-size:40px;color:#ffd700;font-weight:bold}
.daily-claim{background:#00c851;width:90%;margin:20px auto;padding:15px;border-radius:15px;border:none;color:#fff;font-size:18px;font-weight:bold}
.btn-get{background:#0084ff;color:#fff;border:none;padding:10px 20px;border-radius:10px}
.bottom-nav{position:fixed;bottom:0;width:100%;display:flex;background:#1a1f3a}
.nav-item{flex:1;padding:15px;background:none;border:none;color:#aaa}
.nav-item.active{color:#0084ff}
</style>
</head>
<body>

<div id="home" class="page active">
<div class="balance-card">
<div>YOUR BALANCE</div>
<div class="balance-apu" id="coinsHome">500 APU</div>
</div>
<button class="daily-claim" onclick="claimDaily()">🎁 CLAIM DAILY 50 APU</button>
<button class="btn-get" onclick="watchAd()">Watch Ad +10</button>
</div>

<div id="miner" class="page">
<h1>MINER PAGE WORKS</h1>
</div>

<div class="bottom-nav">
<button class="nav-item active" onclick="showTab('home')">Home</button>
<button class="nav-item" onclick="showTab('miner')">Miner</button>
</div>

<script>
let coins = 500;

function showTab(tab){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    event.target.classList.add('active');
}

function claimDaily(){
    coins += 50;
    document.getElementById('coinsHome').innerText = coins + ' APU';
    alert('+50 APU! New Balance: ' + coins);
}

function watchAd(){
    coins += 10;
    document.getElementById('coinsHome').innerText = coins + ' APU';
    alert('+10 APU! New Balance: ' + coins);
}

alert("1-FILE VERSION LOADED");
</script>
</body>
</html>
