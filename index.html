<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://ad.gigapub.tech/script?id=7204"></script>
<script src='//libtl.com/sdk.js' data-zone='11258922' data-sdk='show_11258922'></script>
<title>AdsPayU</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(180deg, #0A2AFF 0%, #0018B3 50%, #000A4D 100%); color: #fff; padding-bottom: 90px; min-height: 100vh; background-attachment: fixed; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; position: sticky; top: 0; background: rgba(0,10,77,0.8); backdrop-filter: blur(20px); z-index: 10; }
  .topbar h1 { font-size: 18px; font-weight: 700; }
  .balance-card { margin: 16px; padding: 24px; background: linear-gradient(135deg, rgba(255,138,0,0.25) 0%, rgba(24,119,255,0.25) 100%); border: 1px solid rgba(255,255,255,0.15); border-radius: 24px; text-align: center; }
  .balance-label { font-size: 12px; opacity: 0.8; }
  .balance-apu { font-size: 40px; font-weight: 800; margin: 8px 0; color: #FFD600; }
  .balance-usdt { font-size: 14px; opacity: 0.8; }
  .daily-claim { margin: 0 16px 16px; padding: 14px; background: #00C853; border: none; border-radius: 14px; color: #fff; font-size: 16px; font-weight: 800; width: calc(100% - 32px); transition: all 0.2s; }
  .daily-claim:disabled { background: #333; opacity: 0.6; }
  
  .miner-card { margin: 0 16px 16px; padding: 16px; background: rgba(255,138,0,0.15); border: 1px solid rgba(255,138,0,0.4); border-radius: 16px; }
  .miner-title { font-size: 16px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
  .miner-info { font-size: 12px; opacity: 0.8; margin: 8px 0; }
  .miner-progress { font-size: 24px; font-weight: 800; color: #FFD600; text-align: center; margin: 10px 0; }
  .miner-btn { width: 100%; padding: 12px; border: none; border-radius: 12px; font-size: 15px; font-weight: 800; margin-top: 8px; }
  .btn-buy { background: #FF8A00; color: #fff; }
  .btn-claim { background: #00C853; color: #fff; }
  .btn-claim:disabled { background: #333; opacity: 0.6; }

  .btn-row { display: flex; gap: 10px; padding: 0 16px 20px; }
  .btn { flex: 1; padding: 14px; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; }
  .btn-primary { background: #FF8A00; color: #fff; }
  .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
  .page { display: none; padding: 0 16px; }
  .page.active { display: block; }
  .card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
  .card-header { display: flex; align-items: center; gap: 12px; }
  .card-icon { width: 48px; height: 48px; border-radius: 12px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .card-info { flex: 1; }
  .card-title { font-size: 15px; font-weight: 700; }
  .card-sub { font-size: 12px; opacity: 0.7; }
  .btn-get { padding: 10px 18px; background: #1877FF; border: none; border-radius: 10px; color: #fff; font-weight: 700; }
  .btn-get.orange { background: #FF8A00; }
  .btn-get:disabled { background: #333; opacity: 0.5; }
  .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(10,10,20,0.85); border-radius: 30px; padding: 8px; display: flex; gap: 12px; }
  .nav-item { text-align: center; font-size: 10px; opacity: 0.6; background: none; border: none; color: #fff; padding: 4px 6px; }
  .nav-item.active { opacity: 1; color: #FF8A00; }
  .nav-icon { font-size: 22px; display: block; }
  .nav-center { background: #FF3B30; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; }
</style>
</head>
<body>

  <div id="app">
    <div class="topbar"><h1>AdsPayU</h1></div>

    <div class="balance-card">
      <div class="balance-label">YOUR BALANCE</div>
      <div class="balance-apu" id="coins">0 APU</div>
      <div class="balance-usdt" id="usdt">0.0000 USDT</div>
    </div>

    <button class="daily-claim" id="dailyClaimBtn" onclick="claimDaily()">🎁 CLAIM DAILY 50 APU</button>

    <div class="miner-card" id="minerCard">
      <div class="miner-title">
        <span>⚡ AUTO MINER</span>
        <span id="minerStatus">LOCKED</span>
      </div>
      <div class="miner-info" id="minerInfo">Buy for 0.50 USDT. Earn 10 APU every hour</div>
      <div class="miner-progress" id="minerProgress">0/10 APU</div>
      <button class="miner-btn btn-buy" id="minerBtn" onclick="buyMiner()">BUY MINER - 0.50 USDT</button>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="withdraw()">WITHDRAW</button>
      <button class="btn btn-secondary" onclick="swap()">SWAP</button>
    </div>

    <div id="home" class="page active">
      <div class="card">
        <div class="card-header">
          <div class="card-icon">🎯</div>
          <div class="card-info">
            <div class="card-title">GigaPub Ads</div>
            <div class="card-sub"><span id="gigaCount">0</span>/100 today = 2 APU each</div>
          </div>
          <button class="btn-get" id="gigaBtn">Watch</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon">💰</div>
          <div class="card-info">
            <div class="card-title">Monetag Ads</div>
            <div class="card-sub"><span id="monetagCount">0</span>/100 today = 2 APU each</div>
          </div>
          <button class="btn-get orange" id="monetagBtn">Watch</button>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <button class="nav-item active" onclick="showTab('home')"><span class="nav-icon">🏠</span>Home</button>
      <button class="nav-item" onclick="showTab('rank')"><span class="nav-icon">🏆</span>Rank</button>
      <button class="nav-item"><span class="nav-center">+</span></button>
    </div>
  </div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const COIN_VALUE = 0.000028;
const DAILY_LIMIT = 100;
const REWARD_PER_AD = 2;
const MIN_WITHDRAW = 100;
const MINER_COST_USDT = 0.50;
const MINER_REWARD = 10;
const MINER_INTERVAL = 60 * 60 * 1000; // 1 hour

let coins = parseInt(localStorage.getItem('coins') || 0);
let usdt = parseFloat(localStorage.getItem('usdt') || 0);
let gigaWatched = parseInt(localStorage.getItem('gigaWatched') || 0);
let monetagWatched = parseInt(localStorage.getItem('monetagWatched') || 0);
let hasMiner = localStorage.getItem('hasMiner') === 'true';
let minerLastClaim = parseInt(localStorage.getItem('minerLastClaim') || 0);
let minerAdsWatched = parseInt(localStorage.getItem('minerAdsWatched') || 0);

updateUI();
checkDaily();
updateMiner();
setInterval(updateMiner, 1000);

function updateUI() {
  const usdtDisplay = (coins * COIN_VALUE).toFixed(4);
  document.getElementById('coins').innerText = coins.toLocaleString() + ' APU';
  document.getElementById('usdt').innerText = usdtDisplay + ' USDT | Wallet: ' + usdt.toFixed(2) + ' USDT';
  document.getElementById('gigaCount').innerText = gigaWatched;
  document.getElementById('monetagCount').innerText = monetagWatched;
  
  if(gigaWatched >= DAILY_LIMIT) document.getElementById('gigaBtn').disabled = true;
  if(monetagWatched >= DAILY_LIMIT) document.getElementById('monetagBtn').disabled = true;
}

// MINER LOGIC - NO STACKING
function updateMiner() {
  if(!hasMiner) {
    document.getElementById('minerStatus').innerText = 'LOCKED';
    document.getElementById('minerBtn').innerText = 'BUY MINER - 0.50 USDT';
    document.getElementById('minerBtn').className = 'miner-btn btn-buy';
    return;
  }
  
  document.getElementById('minerStatus').innerText = 'ACTIVE';
  const now = Date.now();
  const timePassed = now - minerLastClaim;
  const isReady = timePassed >= MINER_INTERVAL;
  
  document.getElementById('minerProgress').innerText = isReady ? '10/10 APU' : '0/10 APU';
  
  if(isReady) {
    if(minerAdsWatched >= 2) {
      document.getElementById('minerBtn').innerText = 'CLAIM 10 APU';
      document.getElementById('minerBtn').className = 'miner-btn btn-claim';
      document.getElementById('minerBtn').disabled = false;
    } else {
      document.getElementById('minerBtn').innerText = `WATCH 2 ADS TO CLAIM - ${2 - minerAdsWatched} left`;
      document.getElementById('minerBtn').className = 'miner-btn btn-claim';
      document.getElementById('minerBtn').disabled = true;
    }
  } else {
    const timeLeft = MINER_INTERVAL - timePassed;
    const mins = Math.floor(timeLeft / 60000);
    const secs = Math.floor((timeLeft % 60000) / 1000);
    document.getElementById('minerBtn').innerText = `MINING... ${mins}m ${secs}s`;
    document.getElementById('minerBtn').className = 'miner-btn btn-buy';
    document.getElementById('minerBtn').disabled = true;
  }
}

function buyMiner() {
  if(hasMiner) return claimMiner();
  if(usdt < MINER_COST_USDT) return alert("Not enough USDT. You need 0.50 USDT");
  
  usdt -= MINER_COST_USDT;
  hasMiner = true;
  minerLastClaim = Date.now();
  
  localStorage.setItem('usdt', usdt);
  localStorage.setItem('hasMiner', 'true');
  localStorage.setItem('minerLastClaim', minerLastClaim);
  
  updateUI();
  updateMiner();
  alert("Miner Purchased! Mine 10 APU every hour");
}

function claimMiner() {
  const now = Date.now();
  if(now - minerLastClaim < MINER_INTERVAL) return alert("Not ready yet");
  if(minerAdsWatched < 2) return alert("Watch 2 ads first to claim");
  
  coins += MINER_REWARD;
  minerLastClaim = now; // RESET TIMER
  minerAdsWatched = 0; // RESET AD COUNT
  
  localStorage.setItem('coins', coins);
  localStorage.setItem('minerLastClaim', minerLastClaim);
  localStorage.setItem('minerAdsWatched', 0);
  
  updateUI();
  updateMiner();
  alert("+10 APU Claimed from Miner! Timer reset");
}

function checkDaily() {
  const btn = document.getElementById('dailyClaimBtn');
  const today = new Date().toDateString();
  const lastDailyClaim = localStorage.getItem('lastDailyClaim');
  if(lastDailyClaim === today) {
    btn.disabled = true;
    btn.innerText = "✅ CLAIMED TODAY";
    btn.style.background = "#333";
  } else {
    btn.disabled = false;
    btn.innerText = "🎁 CLAIM DAILY 50 APU";
    btn.style.background = "#00C853";
  }
}

function claimDaily() {
  const today = new Date().toDateString();
  const lastDailyClaim = localStorage.getItem('lastDailyClaim');
  if(lastDailyClaim === today) return alert("You already claimed today!");
  coins += 50;
  localStorage.setItem('coins', coins);
  localStorage.setItem('lastDailyClaim', today);
  updateUI();
  checkDaily();
  alert("+50 APU Claimed!");
}

// TRACK ADS FOR MINER
function trackAdForMiner() {
  if(hasMiner) {
    const now = Date.now();
    if(now - minerLastClaim >= MINER_INTERVAL) {
      minerAdsWatched += 1;
      localStorage.setItem('minerAdsWatched', minerAdsWatched);
      updateMiner();
    }
  }
}

document.getElementById('gigaBtn').onclick = function(){
  if(gigaWatched >= DAILY_LIMIT) return alert("Giga limit reached");
  if(typeof window.showGiga === 'function'){
    window.showGiga().then(function(){
      coins += REWARD_PER_AD; gigaWatched += 1;
      trackAdForMiner();
      localStorage.setItem('coins', coins);
      localStorage.setItem('gigaWatched', gigaWatched);
      updateUI();
      alert("+" + REWARD_PER_AD + " APU");
    }).catch(function(e){ alert("No ads"); });
  } else { alert("Giga not loaded"); }
}

document.getElementById('monetagBtn').onclick = function(){
  if(monetagWatched >= DAILY_LIMIT) return alert("Monetag limit reached");
  if(typeof window.show_11258922 === 'function'){
    window.show_11258922().then(function(){
      coins += REWARD_PER_AD; monetagWatched += 1;
      trackAdForMiner();
      localStorage.setItem('coins', coins);
      localStorage.setItem('monetagWatched', monetagWatched);
      updateUI();
      alert("+" + REWARD_PER_AD + " APU");
    }).catch(function(e){ alert("No ads"); });
  } else { alert("Monetag not loaded"); }
}

function showTab(id){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function withdraw(){ 
  if(coins < MIN_WITHDRAW) {
    alert("Minimum withdraw is " + MIN_WITHDRAW + " APU");
    return;
  }
  alert("Withdraw request sent!"); 
}
function swap(){ alert("Coming soon"); }

// RESET DAILY
if(new Date().toDateString() !== localStorage.getItem('lastReset')){
  localStorage.setItem('gigaWatched', 0);
  localStorage.setItem('monetagWatched', 0);
  localStorage.setItem('minerAdsWatched', 0);
  localStorage.setItem('lastReset', new Date().toDateString());
}
</script>
</body>
</html>
