<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AdsPayU</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; background: #17212b; color: white; }
    button { padding: 15px 30px; font-size: 16px; background: #0088cc; color: white; border: none; border-radius: 10px; width: 90%; }
  </style>
</head>
<body>
  <h1>AdsPayU</h1>
  <p>Earn $0.0006 per ad</p>
  <button id="watchBtn">🎁 Watch Ad</button>
  <p id="status"></p>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const userId = tg.initDataUnsafe.user?.id || "guest";

    document.getElementById('watchBtn').onclick = () => {
      const adUrl = `https://link.gigapub.tech/7204?sub1=${userId}`;
      tg.openTelegramLink(adUrl); // opens inside telegram
      document.getElementById('status').innerText = "Ad opened. Stay 15s then return.";
    }
  </script>
</body>
</html>
